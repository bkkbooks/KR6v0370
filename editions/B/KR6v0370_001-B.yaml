body:
  text: 佛母葉興磋加實錄烏簡靈巴菩薩流通金剛上師諾那呼圖克圖逞列匠磋譯義弟子王凈圓筆受弟子韓玉宸修飾一大師本迹南無金剛不生不滅蓮花生大師大師本已成等正覺證五智佛度生方便皆悉具足能滿眾願普利有情其五佛母曰納加面達喇咓噶那斯地夏加迭瓦扎西淺真葉興磋加納加華言佛母或生印度或生泥泊爾與不丹或生西藏皆為大權示現助師應化調御有情紹隆三寶大師融通顯密不使兩岐凡顯經密軌中究竟法義無上悉地皆深得釋迦如來師承口訣真正血脈所有金剛身語意三業法報化三身成證祕訣及息增懷誅度生方便皆悉圓滿其記載事迹廣略大小之種類都萬有九百皆為接引未來有緣眾生之用其不堪記載者則瀰漫於無碍六大一真法界太空之中法爾常恆普利有情盡於未來名稱普聞無量世界報化徧滿塵剎國土見身者發心聞名者起信聆音者開悟知心者成佛南無法身常住三際一如蓮華生大師南無報身清淨相好無倫蓮華生大師南無化身變現朅磨無量蓮華生大師非大師自衒釋迦如來已先授記如摩尼寶能滿眾願無盡功德莫能述略舉一斑啟眾敬信云爾二大師成就阿彌陀佛大師圓證無量壽如來無上悉地凡四種淨土中依正莊嚴之相身土不二之德廣長舌徧覆之跡與普攝眾生之多廣如阿彌陀諸經所載茲不復述三為度人類示迹大師為度惡性闡提及誹謗疑懼眾生故由阿彌陀肉髻中放紅色光光中化出金輪王王四天下具有千妃而無一子迺廣作佛事離非梵行其國西南有大乳海盛生蓮花菡萏敷發郁馥繽紛王日飭採擷持以供佛阿彌陀佛常於舌端放五色光加持海蓮時花叢中特生大蓮苞長二尺諸花開落新陳代謝惟獨此蓮經歷寒暑久未開敷眾咸驚異而報於王王乃飭人晝夜守護歲次在申正月朔日其花乃敷化出五兒其兒膚體五色配生各具五髻中為青黑東為白黑南為黃黑西為紅黑北為綠黑腕臂脛釧耳璫纓珞衣祴天飾眾寶嚴身守者白王王大歡喜命駕五獅寶車五百寶馬車王及王后與其宰相侍從八萬人俱齊集海濱羣眾諦瞻華上五兒安住不動相好光明儼然報佛身如虹霓髻放五光面如滿月紺目慈視額廣平正鼻高修直齒白齊密聲同梵響手足轂網人相具足等佛功德不可盡述王見是已頂禮三拜竚冀慈示五兒齊聲謂曰爾可詢諸阿彌陀佛王乃報曰我信諸仁即為彌陀示現為愍無始眾生流轉生死不知出要於是秉如來無上菩提運五佛一切智智以金剛身語意三業行息增懷誅四法拯濟羣盲令出苦海中現忿怒金剛東佛陀南寶生西蓮華北朅磨皆是觀音化現能入胎卵濕化四生之類等流現身廣作佛事普利有情王說是已五兒乃乘五獅寶車及寶馬妓樂前後圍繞來至王宮四普度六趣示迹大師為普度法界一切四生六趣悉免輪廻故於六趣中皆為示現一一趣中八方同時俱現五身如是六趣各有四十化身茲據一三千大千中東方世界一百國為一國土過此同等萬有二千國有一國土名職馬滅巴寶珠為地壽命長遠衣食自然享受如天純變化生遠離眾苦其國有佛名職滅渣時蓮花生大師名古魯卑馬節魯幛顯密二教皆極發揚師於六趣八方皆示現化身南方過此同等萬三千國有一國土名原點炯容佛名斜巴土巴廣却真其時大師名古魯盛作渥果爾依正二報與應化法教具如上述西方過此同等二萬國有一國土名簡累顯土贊巴人壽八萬四千嵗佛名斜加土巴原等女勇竟幾其時大師名卑馬噶爾節枉磋北方過此同等三萬國有一國土名克杈滅巴佛名斜加土巴僧格扎其時大師名卑馬葉卓普他布扎爾顯密二教皆悉隆盛東南方過此同等八十萬有四國有一國土名懶巴爾濟佛名斜加土巴者也必度其時大師名卑馬耡異噶僧格西南方過此同等七十萬國有一國土名勒普度朗佛名斜加土巴日躋進其時大師名卑馬延作補葉巴扎爾西北方過此同等五十萬國有一國土名惹補杜朗巴近佛名整田整却巴爾其時大師名卑馬節補簡若灣墮爾東北方過此同等四十四萬國有一國土名東瓦舍魯瓦佛名土灣零幾甲哥其時大師名卑馬力堆枉磋應化法教具如上述其他不述方所為諸經所具載者國名朗巴爾主巴佛名枉左甲爾波大師名卑馬匠稱滅都顯密二教皆悉隆盛又國名壬清組巴佛名壬清甲爾波大師名卑馬過累果每又國名果斯爾炯容瓦佛名俄果爾陽巴大師名卑馬喇補覺滾窘又國名格瓦朗巴爾覺巴佛名格妥普甲兒波大師名卑馬約利甲爾瓦又國名作果爾國巴佛名作朵兒寍波大師名卑馬桑堪匠功又國名俄貞兒炯容瓦佛名離巴爾松瓦大師名卑馬果斜累阿耶又國名葉巴爾怕爾瓜佛名葉巴爾松瓦大師名卑馬納蒙朵兒寫列又國名堆瓦爾覺巴佛名堆瓦清波大師名卑馬可利烱容京又國名滅度兒粘巴佛名滅都枉波養大師名卑馬奪姑朗烱容又國名勇施扎瓜佛名扎圭巴爾大師名卑馬整比把俄又國名朗巴爾耡巴佛名主比加爾波大師名卑馬噶達甲兒波又國名朗巴爾匠瓦佛名扎養滅則巴大師名卑馬魯仰担巴又國名免節滅巴佛名滅節加爾波藥師佛名大師名卑馬覺約爾達瓜又國名朗巴爾達瓜佛名約爾登貞益大師名卑馬可爾哇董作又國名壬清果巴佛名噶威兼大師名卑馬朗中葉寫又國名朗巴爾斬巴佛名勇殊鞏必甲爾波大師名卑馬迭瓦屑經又國名勉組雅銀勇波佛名捨爾節經波大師名卑馬晨音朗卓爾又國名俄舍兒担巴佛名俄舍兒巴貳大師名卑馬邱引班巴爾又國名朗巴爾寫瓦佛名寫維枉波大師名卑馬滾却清波又國名整清朗巴爾果巴佛名凖起巴貳大師名卑馬捨節兒枉又國名義朗担巴爾噶佛名容養大師名卑馬甲爾波滅隆又國名滅隆金可兒養佛名滅隆節大師名卑馬堂聽朗儱又國名達累儉巴佛名達阿巴貳大師名卑馬葉朗覺背又國名立米俄則爾滅巴佛名立米寧波大師名卑馬煙占阨拉又國名補貞阨丁佛名補節加爾波大師名卑馬朗達葉寫又國名舍俄朗哇佛名舍節爾枉磋大師名卑馬納磋壬清又國名俄磋兒果巴佛名果卑加爾波大師名卑馬古拉噶雅又國名舍兒經烱容內佛名舍兒節日組瓦大師名卑馬竹清整組又國名巴爾節俄斯兒佛名巴爾節加爾波大師名卑馬節西利邦又國名朗瓦當巴佛名朗瓦則瓜大師名卑馬立瓜登經又國名仰內滅巴佛名仰立滅必巴爾大師名卑馬却寧通噶又國名噶永擋佛名噶永却巴爾大師名卑馬節經朗誇又國名日經烱容瓦佛名日幾巴爾大師名卑馬三阿巴克卡又國名善經奪兒瓦佛名搿渣真節大師名卑馬壬清杈者夜又國名容司烱容瓦佛名松烱瓦大師名卑馬則貞甲演又國名他迭覺巴佛名宜更滾節若綳大師名卑馬若多補匠逞又國名匠蒙稱綳經佛名懶巴兒甲爾瓦大師名卑馬蒙巴朗遮又國名滅冬遮經佛名滅多果別加爾波大師名卑馬滅渣噶遮又國名遮也巴爾朗瓦佛名湯蒙結朗瓦大師名卑馬可爾瓦諾那又國名貞點果巴佛名貞點質大師名卑馬若爾巴朗達又國名僧格烱容累佛名僧格蒙主克大師名卑馬他蒙得道顯密二教皆悉隆盛又國名印度佛名釋迦牟尼大師名蓮花生一切應化事跡度化法儀如內外典籍顯密經軌政治沿革民情風化廣如諸經所載恐煩不贅五密法出生之濫觴密法如何出興於世耶為欲令眾生除疑捨邪執遠離不信發生涅槃淨信安樂解脫得達果海故乃出生喇嘛金剛手菩薩在過去若增一劫若減一劫皆不可紀不可說不可說劫前有一世界名晚巴爾噶瓦有三萬三千佛次第出興其中有佛名阿達魯馬其傳法時期有國土曰結累展巴國有父名覺巴日拉乃國王太子母名日覺馬具大慈悲生子名得覺蒲皈依阿達魯馬佛法名者也必度當時輪王即大日如來化身太子名曰莽清却董君正莽清却眾皆相信義金剛手灌頂名曰沈巴朵結成佛名曰滅磋瓜不動義父名奪馬絜巴母名奪馬幾巴皆平民生子名咱門達皈依法名曰滅卡巴兒灌頂名朵結取鳥成佛名曰阿彌陀父奉不妄語獨修教者名阿然支母名葛得馬生子名寧經皈依法名曰但遮巴爾灌頂名朵結永成佛名曰毘盧遮那父乃橫暴徒名古巴達母名撒門躉也生子名單補惹阿皈依法名曰滾寧在灌頂名禮節多結成佛名曰不空成就父乃王宗室名滾里蕩母宰相女名阿那馬生子名班經皈依法名曰朗經灌頂名朵結壬清金剛寶義成佛名曰寶生上述諸仁皆利根上智普門深入塵數三昧甚深秘軌皆悉修學即身圓滿無上悉地五方佛灌頂成佛此其大畧六馬張噶汝渣之來由阿達魯馬佛末法時代有國名奪烱容查蒙父名日姑噶那生子曰果烏滾車衣僕名蔗滿得瓦當時有苾蒭名土瓜覺落昔為大富長者名清打清波親見化佛出世為佛成道後最初度脫受苾蒭戒者梵行清淨禪波羅密滿足人皆敬信皈依果烏滾車衣與蔗滿得瓦亦從其出家彼主僕未皈依土瓜覺落之先曾聞不守五戒貪瞋癡慢不加對治索得密宗秘旨智慧現前決成無上菩提持此意見而來皈依主僕恭詣師前頂禮膜拜具陳所見師言善哉允其皈依并語之曰六道眾生流轉輪廻無由解脫欲除眾苦守戒乃能初學者非持戒莫辦於是主僕同出家主法名曰他把那跛僕曰甸怕平聲未幾他把那跛白師請示眾生直趣無上菩提之逕路土瓜覺落以偈示曰本心法爾涅槃門貪瞋癡慢任起滅猶如雲霧不壞空求徧空界無逕路說偈已并反覆示教令顯自心莫外馳求寂照任運真常自如成佛法要無逾於此主僕聞已歡喜恭敬作禮而退主者他把雖聞法要未徹源底身雖出家心住凡情貪癡見慢我相自如僕者甸怕依法實修竟躋高明日趨解脫一切事相皆不執著身供僕役心超凡境能尋自心而趣覺路於是主僕興諍岐生牴牾主言貪癡一切我堪任運僕言任運是已而本性不移主言共一師承何來兩岐僕言雖同師同聞而不同用本心法爾如是我自如是了知主言我亦如是世間貪痴等法一切不加對治密宗秘旨如是言下盛怒及之僕曰生佛心源同一體向外諦求不可得法然本性勿取捨自心菩提自尋求捨此別無覺路如是報主怒仍未息僕再曰自心漸明即佛本心法爾如是不妄動一切煩惱如雲散膽大心寬生佛一如師示要旨如是無餘主更盛怒曰我師方正誠言無誑為世希有爾我諍論當憑師決乃同詣師前各陳所主土瓜判曰他把未成甸怕已證他把怒曰師不平等法傳兩岐我今迸僕師亦當去和諍無術仲裁不平不堪作師可率眾行勿再留此師言世間信我者眾不信而輪廻六趣者亦眾勿庸多述師遂遠颺師行後他把遂破戒隳信狂蕩無忌殺人之夫而取其妻食人之肉衣人之皮飛禽走獸肆行罹捕一切婦女恣意奸污貪痴熾盛意樂不疲縱其眷屬肆行殺盜淫妄者十有二年他把身死墮畜生道五百世受瘈犬身五百世受食肉野獾身五百世再墮蜂蠆五百世蜈蚣五百世墮蛆蟲類不可說世又墮食涎吐鬼類五百世又現不可說餓鬼世如是展轉竟墮入金剛地獄此地獄壽長八萬歲從地獄起又入食肉齧骨畜生道若干世乃還入人道生貧苦家死後復生惡性貧苦家時丁燃燈佛末季其間無佛法者亙數千年時蓮花生大師應化區域仍為食人肉國家傍近喜馬拉雅山麓蘭迦不那地有女人名曰滾肚覺我初夜與魔王交中夜與山神交後夜與天神交一宿三交而孕八月後生一子三頭六臂四足手持兩弓頭各具三目服飾奇怪生後世界不靖吉祥勝事不復作惡夢癘疫魑魅魍魎水旱兵燹地震山崩種種災異層出不絕越九閱月其母遂死眾咸歸咎此兒併其母共葬塚中塚間有大樹曰納魯遮䲭梟巢其上毒蛇蟠其下猛獸野豬充塞其地此兒食其母死乳七日不死繼食黃水七日爛血七日腸臟七日膚肉七日骨髓七日亙四十二日其身漸壯翻身播塚而出共食噉人肉鬼怪而居食人取其頂蓋以為器食蛇取其皮以為帶食象取其皮以為衣食虎取其皮以為裙飢食人肉口角垢集渴則飲血常坐污穢地取死人骨灰塗身久之徧身有光同劫火色右頭白色左頭紅色中頭青黑手足肥大皮膚粗糙貫髑髏作瓔珞新陳乾枯三串嚴身面塗人血身毛如豬眼皆赤色髮色紅黑半披半束五色蛇索結之手足形如雞爪腕脛皆束五色蛇索為釧極嗜活食一切眾生肉右手常持三角尖刀及一切殺害凶具左手常持盛血天靈蓋痛飲不輟口常呼出一切傳染熱病細菌鼻常呼出一切傳染寒病細菌眼耳部常出一切雜染病菌其他若皮膚𤷓灼疾痳瘄疹卒中風痰急癇癲癇關節膿瘍全身流痰種種可畏之病菌咸從其週身各部流出貽害眾生此毒兒名曰馬珠馬張蒙噶汝渣當是時也娑婆世界大好區域凡二十有五明有王臣管轄領土幽有鬼神常秉守護隸屬于天者四曰補惹阿囉馬曰扎連達拉曰武兒健曰阿爾布達隸屬於乾闥婆者四曰槓達瓦惹曰惹每屑惹曰迭委曰馬納隸屬於藥叉者二曰噶馬汝曰溫止別餘諸天所屬者三曰紫霞曰古雷曰果薩拉以上屬空行天趣屬於食人肉九頭身之國者二曰噶甯噶曰藍巴噶次於九頭身之國所屬者二曰班止曰黑馬拉屬於龍王者二曰遮打布惹曰止罕迭瓦屬於龍之眷屬者二曰索列曰生寧屬於阿修羅者二曰納噶曰勝都屬於修羅眷屬者二曰麻羅曰古汝達皆尸陀林之所以上屬於須彌山以下諸趣諸趣國土本屬安謐忽感天魔擾亂彼魔手持三角尖刀與月斧肆行殺戮淫慾食噉贍部洲人類精氣震播諸國互相爭鬥譏訶殺伐終無已時娑婆國土大千三千皆不寧靖眾咸慮之思擇一主以禦魔侮乃相率稽首求救於此毒兒號曰馬張噶汝渣咸虔致三業翹勤五體俯首聽命因之嗜殺毒害之輩皆類聚羣分環拱於彼於是大逞荼毒肆殺無辜柔和慈善者遭殺窮凶極惡者得獎馬張噶汝渣顧盼自豪曰三千大千惟我獨尊身出火燄哦哦有聲此聲出時眾生心皆迷亂不軌正道彼一切凶暴眷屬咸大擅威權其夫人曰董稱馬語之曰此喜馬拉雅山頂有燃燈佛之弟子住此修行身大於牛威力無比朗噶國眾咸怖畏之莫敢抵禦汝渣聞之於夢寐中大發忿怒身部病菌飛騰空際降注果噶湯馬朗噶國屬地殺人無算於時大地震動人咸怖畏朗噶王自定中觀之知是馬張噶汝渣來此作亂考佛說圓點正經多經所載係得罪師尊暨師兄者由三惡道轉生侵掠眾地大肆荼毒將來有大佛化身調伏令度斯時大密宗當重興於世王乃鳴鐘鼓令於眾曰我為三千主四王我隸屬一切莫我敵誰敢於我侮汝渣答曰我為大千諸天王眾咸皈敬推第一王乃報曰慚愧不如願歸敬服從而不抗拒於是王及夫人皆臣伏焉汝渣又詢其夫人曰伊誰更右於我者董稱馬報曰有阿修羅王曰馬哈噶若者是遂往碎其王身棄擲於地星辰日月皆得統屬修羅諸宮盡為所有刀仗兵器沒收無算大張旗幟於門示威於眾曰誰敢予侮者復次又詢誰右於我夫人曰忉利天之上有處名噶登者徒眾海會中號曰單巴杜格爾天王皈依音樂香花衣鬘飲食常作供養汝渣聞言疾首蹙額大發忿怒又往其處生擒單巴擲地而死單巴死時曾語其徒眾曰佛經記載此大魔熾盛後不久有密教明王降伏之密法當大興為調伏彼故密教有得權與財之忿怒佛出生廣施眾生藥品甘露眾寶妙法乃至微塵許地佛皆普化無遺佛說不虛我身雖死旋生人趣坐菩提樹下而成正覺我法勝行閻浮住世亦久將來降伏彼後外內密真如究竟五種緣會一切出興汝渣聞此說已心生微懼乃將此天付囑天魔管領此天魔即回教之初祖已仍返住喜馬拉雅山巔七調伏馬張噶汝渣之因緣爾時阿達汝馬佛金剛手佛大勢至菩薩金剛薩埵南方金剛阿彌陀佛大日如來北方金剛及一切不可說諸佛咸集誓言汝渣荼毒導眾行惡撥無因果娑婆眾生將被趨入地獄應加調伏於是聖眾諦觀察其宿因實與其師土瓜覺落並其師兄甸怕有緣遂用一切佛灌頂之加持力令其師成金剛薩埵其師兄成大勢至菩薩師徒既度師化觀音其忿怒身為馬王佛徒化緣度母其忿怒身為猪王佛母同至山頂馬王唱曰哈哈赫厄赫厄火火猪母唱曰項項吽吽呸呸王母疊相唱和汝渣聞曰爾小馬猪今何所謂此三千大千上自有頂下達阿鼻莫不敬畏臣伏于我無敢正顏覿我面者雖以單巴杜格爾之威神亦莫我何爾等其下伏靜住勿得妄動隨以手按二王頭頂爾時馬王佛由汝渣肛門中入貫穿其頂露出馬頭放火焰煎其全身脂膏令馬頭成綠色猪王佛母由董稱馬陰道中入貫穿其頂露出猪頭煎其脂膏令猪頭成黑色午王亥母雙身和合唱隨如前一切金剛忿怒諸佛咸化為飛鳥翱翔空中層密行布助其威勢汝渣痛楚不堪嘆曰我今敝敗外道亡矣佛法興矣阿修羅亡矣天王興矣背佛者亡矣信佛者興矣夢寐所見天擊水火擊樹水擊火風擊雲彩金剛杵擊諸空峒朕兆若是預知不祥憂痛慘惻惟冀速死一彈指頃肛門遺屎墜於大海澄入龍宮化為大樹根生海底枝撐阿修羅宮花果敷實於天庭衣食用物咸從此樹梢流出修羅恆與天鬥者即爭此樹也午王亥母同深慈愍和平歡悅不懼不驚折伏汝渣令其命盡所有汝渣之服飾器仗皆成戰利之偉績歷來密乘所傳金剛忿怒相及嚴身飾具即從此出汝渣身死心猶未平賡現九頭身思滋毒厲重為世患大勢至菩薩乃化九忿怒金剛徧串其身汝渣備極痛苦急呼其十方守門眷屬啟門奮鬥口作汝汝聲疾趨羣眾鏖戰空際斯時馬王三眼中出生十方金剛手持降魔杵盡伏諸眷屬咸以其衣食供奉於諸佛汝渣悟曰我惜所造諸罪業于今咸集于藐躬業由自作還自受果報毫髮不昧爽我今心慮焦如焚跼天蹐地無逃遁願從今始夫婦二身俯伏佛座慚諳內典敢作外護食佛餘唾為內眷屬至心皈命永不破戒爾時馬王佛以金剛杵加持三處受密乘灌頂遂成為馬哈嘠納大護法此午王亥母調伏汝渣之經過也八賢劫千佛出世之緣起爾時有世界曰朗巴爾劍巴王都曰朗巴爾打瓜轉輪王曰容可兒松七寶具足王四天下有妃嬪七十萬眾生有千子皆具三十二相月之望日王遊園囿有馬滅麻及別滅麻二妃無子隨從伴王而坐懷抱中忽感來二子相好莊嚴異於常兒跏趺而坐王及二妃方咤異間空中有聲報曰二子乃菩提薩埵二母乃般若佛母二子亦同聲言曰我二人同發菩提心歡喜皈依於佛願世界昇平拔眾生遠離諸苦於一切時處得究竟樂皆莫能及王及二妃同稽首合掌讚曰於不可說不可說若增一劫減一劫發菩提心勿棄捨諸餘發心所不及無比上味如甘露諸佛教中為第一時有喇嘛曰余顛朵絜道德高深王延至宮合掌涕淚白曰師乃慈愍眾生發菩提心者二妃忽感得二子求師加持拔除不祥余顛答曰如來功德巍巍匪可憶度宜用金瓶內盛寶珠及摩尼眾寶以為供養然後誦經祝禱王乃陳設供事請喇嘛陞獅子寶座誦經七日香花燈明飲食衣樂美備羅列無間宵旦並求觀千子中誰為先成佛者喇嘛作法之次隨以廿五種十種四種諸灌頂法為此二子灌頂復以定中所觀報王千子中長子成佛即七佛之首法名曰約忍朗達容諸成佛名曰迦葉說時大地六種震動音樂不鼓自鳴乃至千子最後一子法名曰卵他翼成佛名曰末巴諸大王子羣咸問於最小王子曰我等成佛汝將何事小王子答曰佛德如天我心無盡天空不隕我心不滅廣持毗尼自利第一發菩提心利他為最盡爾九百九十有九福聚神通智慧功德度生方便我皆具足是時千子俱在獨二子未來千王子同以上義問二王子其一曰我名秋集沈巴兄等成佛我為金剛手凡顯密二教及最上密乘我盡任持諸佛秘藏我堪守護行者修學我咸護念其一曰我名秋集若組兄等成佛我為請法梵王請轉法輪領眾聞法并宏揚聖教此化佛出世之因緣也九佛法歷劫住世之程序過此世界一億佛土有一世界顯教昌明民安物阜經五方佛應化以後此土空過無有佛法迨劫經壞空至成劫時有一國土名曰住矴歷受眾生擁戴敬服之天王有九嗣出世者傳顯教佛一傳密教佛一獅子王一金翅鳥王一開敷花王一過此以往至鐵輪王世顯密二教兼住應化如是五朝王名曰達里扛其子曰嗟我幾其后妃共百二十有九皆敬信三寶持戒精嚴極畏地獄欣慕成佛發大勇猛悲智兼修其傳法佛曰麻免者曰可爾完結格曰然母通曰朽巴曰典濛遮曰斷捨加爾曰噶加爾所傳法教為八萬四千約為十二分教再約為三此為化佛設教其報佛所宣為即身成佛法門不畏破戒不望成佛自明本心言亡慮絕甚深祕密法爾如是其時國王曰贊朵爾傳法佛曰卑彌納曰古汝扎圭納外內密儀軌都為一千有二十五部約為十八部再約為七部更約為三部曰馬哈約噶曰阿落約噶曰阿兌約噶其教普及天下復次密教顯教菩提戒三者並盛時期印度芒噶達國都城曰補顛王曰納漿子孫繼承至十七萬四千代民心和善正信三寶離非梵行行十善道爾時有七佛次第出興曰朗巴在格曰杜朵爾絜曰湯絜覺布曰落瓜得什爾曰啥爾妥卜餘二未詳皆傳顯教三種其傳密教金剛喇嘛曰答爾圓點落點其傳法次第先教觀心次習禪定次降魔次氣功次雙身次對利根上智者傳即身成佛法次三昧耶戒法次喜金剛法次上樂金剛法次密聚金剛法次普爾巴法次忿怒佛母法次亞馬然渣法斯即阿達魯馬如來以下諸佛相承之法教有如是者復次滾肚朗國土王名昌真者子孫世承至七十九萬有一百有四十有八代時佛曰俄松燃燈佛以戒定慧三學住世其王曰那瓦井傳密教金剛喇嘛曰古魯皮永覺爾諦詧當時世道寖衰人心思亂戰爭時起遂示寂相投生王家為太子時即求出家那瓦井王允之歸依師曰仗松杜拉黑膚仙人也太子名曰葛烏打馬生有宿慧感佛教衰微思明政典救之觀仗摩與卑密扎拉之因緣特現身說法明因果正典刑以風示教導初於尊真尊下平聲幽僻之所築草舍以為修持仗摩妓女也先與卑密扎拉密約至尊真幽會途次受人纏頭五百先交歡焉及至隱不以告旋為其婢發覺卑密大怒刃殺仗摩於野婢復宣言於眾致卑密大懼遂棄血刃草舍之側冀嫁禍葛烏打馬旋觀眾麕集質問葛烏汝習佛者何故殺人葛烏不之辨眾乃捉繫王所并倒懸於樹其師仗松杜拉來扣其故徒曰我有罪師曰如何避免徒曰果殺仗摩者無論已矢曰仗摩我實未殺者師身黑膚立變金色否則如故言訖仗松果成金色身眾異之咸來歸依詎仗松貪圖利養忘救其徒毀信畔道肆行十惡風火熾盛淫欲不禁赤白二液忽墜於地化為男女同坐甘蔗樹下親釋葛烏而身已死仗松大慚曰吾徒冤甚時空中有佛諭王及眾罪人不治必感大患水旱癘疫饑饉寇盜災禍橫生因果如是蓋由刑賞不當善者無辜獲罪不肖者幸免得逞乖戾之氣遂徧寰宇今為王眾明正典刑殺人者死傷人及盜抵罪眾作惡者不貸抉眼斷手刖足等差論刑屢犯不悛處以大辟慎制律令核實決裁守法不阿不狥私恩廓然大公取信於民民自奉法而不作亂復治堅甲利兵戈矛弓矢藏之以備預不虞而討不庭如是則四域歸心嵗稔人壽諍和訟息疫癘不作牛羊茁壯人依正信至教當興佛說是已四天王至告于眾曰葛烏打馬無罪一言之矢師成金身往佛已來甚為希有福智所感將來必作轉輪聖王爾時血刃騰入空中化為雷霆擊斃卑密扎拉婢與賂者均遭擊傷葛烏往生兜率內院將來成佛曰滾杜槍三身成就義國王政教並行即從此始滾杜槍在天男女皈依者眾并傳無上密宗有大弟子曰淡巴杜噶爾者乃傳密大阿闍黎曾受如阿耨達池四河流之灌頂稱為四種灌河分述如次甲羅漢喇嘛灌頂即蓄三衣瓶缽拔毛器等八種而作法師者乙傳法講經灌頂丙化身佛灌頂計有八種丁外密灌頂結印持咒等計有八種戊內密灌頂心作忿怒觀等己密密灌頂心內灌頂八種此六項為一種灌河復次甲馬哈母渣灌頂法爾總持之灌即身能出生四波羅密乙金剛灌頂用鈴杵等灌計有十種丙成金剛喇嘛灌頂即成就法身報身化身化報身報化身五種丁朅磨契印灌頂即雙身灌頂為最高密義此四項為一種灌河以上二種灌河為特殊灌頂復次甲求長壽灌頂乙求智慧灌頂丙有財權普施灌頂丁滅無明得真明灌頂戊生趣自在灌頂己住空入水神通自在及能現畜生身等灌頂庚制伏外道小乘灌頂辛所願圓滿成就灌頂壬身口意三業成就灌頂癸有考察經軌及傳授權灌頂此十項為一種灌河名為通用灌頂復次甲身灌頂五種要處在頂乙口灌頂五種要處在喉丙心灌頂五種要處在臆丁功德灌頂五種要處在臍戊技能灌頂五種要處在手足此廿五項為一種灌河名為緊要灌頂如上灌後則天上密教傳有師承矣滾杜槍乃往人間應化其位并衣缽花冠瓔珞等即傳於彌勒西印度有王名左果日藏其國共分廿一區登覽必波即尸陀林地有佛宮殿在焉七寶莊嚴人跡罕到王后曰却馬同時孿生雙子長幼莫分君儲難決王命二子將來同時娶妃誰先得子者王其父若同時生子則屬位先能言者之父及長迎娶生子及子能言俱無先後其時國泰民安五穀豐稔風雨調順兩妃各誇其兒福德所致相人者言一當作王一當成佛一名脫覺爾簡一名顯達那克且於是宰相與臣民公決王其相好者脫覺顯達不服中懷異謀事泄被讁於所薩林為菩提場西大尸陀林多毒蛇野干及噉肉飲血諸惡鬼神蟠踞其間甚可怖畏顯達不懼不驚一心修持得一切佛加護普授彼秘妙法要如是百九十年成等正覺而般涅槃又印度有真顛地其人跡所能到處以觀想念誦禪定三種為教化復次以法報化三身義度化人類對機立教義理各別顯教義分眾生為六道各別度化密教義分眾生為三類密教無上義分眾生為五類皆隨時劫增減壽命慾事延促輕重而有差別劫初人心質樸少慾飛行有光漸至相視相笑握手鈎𢫎轉轉入重乃至四種慾事同具而胎卵濕化四生遂分且舉娑婆一四天下為例東弗鬱逮為化生南閻浮提為胎生西瞿耶尼為卵生北鬱單越為濕生相視成淫者經百年相笑者六十年握手者五十年鈎𢫎者直至於今攝二根交會在內以上皆以耳目聰明見佛聞法而得度化者也述真顛應化事竟十釋迦佛應化世界法教遞變之概况大勢至觀音文殊三菩薩同度之地即蓮花生大師應化之區域也蓋由孫噶納地即今康藏多麻昌類似修羅及魔鬼等眾復多人猿交生之種兇狡難調捨密乘究竟方便莫由度化釋迦佛在人壽八十歲時出世傳顯教三乘及密教外密四部最深秘之觀念禪三者遂秘而不宣緣深秘中降魔與雙身法非當時聲聞機所宜故其實無上密宗在釋迦應化以前即已流布於世蓮花生大師未出世以前釋迦穩覺察爾隆典經云佛涅槃後八年地名達納果嗄海中大蓮花上化生一佛名曰卑馬烱容利一切密乘由彼擔荷又那密斷宗經云我涅槃後八年我再出應世名曰卑馬烱容利世間第一莫能敵比最上密乘由是傳佈又甘杜渣威舉經云佛說與我同來教主名海生金剛傳外內密諸法爾時國王名主朗勁又涅槃經云殺那展母却雙林間佛示寂時摩訶迦葉他往惟噶達雅那準達滾高即阿難三人在側佛囑累曰我涅槃時至爾勿焦心亦勿號泣即住多劫此身終當變滅將來當有勝我者出生海中佛不妄語信而可徵釋迦所說側重顯教密教金剛喇嘛蓮花生其應化神變曷可述茲先舉其示現所在厥有九地中央成佛之處為印度金剛菩提場東方為磅噶納南方為別達西方為烏間北方為郭爾喀東南曰殺火兒西南曰康波西北曰賞林東北曰噶馬汝諸地人身大小不同語言文字類分三百有六十食稻衣布等無差異有政教統一者有政教互異者有政教並行者有農工商賈各世其家恆其業受授不紊者顯教成名者曰仗松梵言羅則巴那密教成名者曰竹陀出家受戒者曰更敦在家不剃染而蓄徒眾者曰懶覺爾巴類皆不自工作受人供養顯教大小乘分七宗或八宗又分四眾與五眾堅持淨戒無有違犯四無量心相應有成閉關靜慮智慧甚深能明辨二十種般若經者名曰堪布明本心性永絕無明心境不二身土一如息增懷誅堪任修持外成八法內成八法降魔雙身深秘諸軌修證有得者名曰喇嘛於上述各類律儀軌則修持功能一依大小性相律密曉了明辨貫徹無疑者名曰班者達能决擇論著之疵瑜能和合顯密之諍端若於論師所持邪正精粗兩相諍辯時由教政二王分治之其會勘儀式教王坐寶座政王設大鼓右為在家眾左為出家眾中為造論師周圍侍衛森立教王默然政王聽審論師陳說旨趣關顯教者交出家眾勘察關密教者交居士及學密者審辨會勘既畢乃付之教王經數月稽核是否契合教典不背世法是否言簡意賅悲誓深切更經兩馬哈班者達交互對辨驗其論旨果否與菩提相應真從心得抑惟摭拾據顯與密各證其義既成乃置中式者寶幢之上班者達散花供養請造論師坐于寶座內貯滿食子者王及臣工庶民咸恭敬禮拜焉其有論著邪僻者則以論文繫之犬尾焚之人皆掩鼻而過論者復由政王治罪截其手足指棄之海濱以飼螺蚶彼印度顯密二教絕非兩岐於彼佛徒極為恭敬尊重彼堪布喇嘛班者達等亦非自號皆由公决共信而來良堪則傚十一大師降生西印度之事迹蓮花生大師生西印度其地形如銅鈸約分五區區域之最大者曰灣者牙又劃為二十一區共有小村鎮一千零十八所都為九十六國最中央曰達納果嗄有村落二十有二最中村曰則頂有大宮殿堂皇美麗殿中有藍色寶珠樓閣幢幡七寶莊嚴儼如報佛法界宮文繁不具載名曰海爾噶寶恨復次中央地曰脫覺爾谷典東方曰展布麻那南方曰巴爾巴達西方曰納噶斯得北方曰噶噶相巴那東南方曰仗松西南方曰申波西北方曰攏打東北方曰挌谷此九處為西印度環海之地皆大師應化之所也統領諸地之王曰簡免覺典別名展家格爾爹噶烏斜達那巴納恩漲波迭王之器用服飾極為繁夥多有妃嬪生子亦眾但皆不成長彌月即夭王忽不幸雙目失明時值饑饉為災餓死者眾王及后妃大臣宰官以庶事未康計慮縈懷阿捨那仙人也后與大臣延之入宮慰問於王王曰國運不昌子死民亡目失其視修道未成奈何仙人曰人死不可生財散不可聚目喪難明病熟難免焦慮何補徒滋傷身欲轉定業惟仗佛力冀求解脫捨是無他圖王聞之大悟憂惶頓釋其身豁然轉羸為健五月望日王建法壇宣誦般若波羅密經為眾回向并發帑藏佈施於民民無食者得食蓮苞王率土內噶馬汝地其東北有海曰殖民當顛盛產蓮花中有蓮莖粗可合抱時維辰年季夏六月日宿在鬼有王臣採蓮而食見大蓮已敷析為八房中出小兒相好光明端身趺坐心亟咤異欲返報王又慮不獲將得反滋罪戾躊躇久之仍赴國門央閽者求見王適發帑將竭索者坌集王虞不濟方聚臣工圖理財治生之道不及陛見事遂寢置蓮花生大師以何因緣化生此邦耶以阿彌陀佛為度生三事垂現大師之相一思漲波迭樂善無子為令眾生知因果起正信故二為六趣有情化現六道金剛各得即身解脫故三為印度鬼稠人稀西藏復多神道惡魅皆待密教方便度化并為成熟赤松得真藏王故殖民當顛海闊百有二十里以目光所不及見者為一里形圓色青視可澈底具八功德一清淨二透明三甘凉味美四水軟無垢五塵墜不渾六飲之暢快七飲後疾瘉身健八能止瞋恚貪痴頓生智慧自茲大蓮晝開夜合大師由此出現王之國祚亦轉為隆永王臣奏報未達王問求子術於星者但云多開庫藏布施珍寶即當得子巳年正月十五王勅開寶藏三千所廣施民眾適阿捨那七人等亦來索寶比時王藏已未滿其欲阿捨那言不我給者前施無功續續求子於法無驗心懷瞋恚火燒八護方神致神作殃雷震冰雹霪雨積雪國大不靖人民戰慄王欲取寶珠于龍宮咨之海商年老者欲與偕行老人謂龍屬廣多事泄將大作風浪而為障難勢不可行王意堅決乃備餱糧舟楫徵眾善入水者隨之行舟儲七纜沉海下探越七日纜絕如是七次使皆不返以使者私欲盛無饒益眾生心故王視民如傷利他念切晝夜思維彷彿偕老人竟詣龍宮見山白者知為銀山黃者知為金足所履處金砂徧布青山巍峩知為純青寶珠先命老人去近見宮殿上陳寶珠門掩未闢以金剛杵啟門龍女來應復有青色龍女厥貌甚美手持青色寶珠二老人迎取殷懃將護堅持而返緘默不言王見是已豁然而寤遣老人如所見往探果得寶珠王左眼漸復覩光乃欣慰載寶而歸途次王臣來迎前奏報未建者道經殖民當顛海王忽見大蓮放五色虹光水鳥鴛鴦和鳴游泳命眾往瞻眾驚問王王何得見王曰我眼忽明王臣具奏昔見蓮產小兒之狀以王勤勞未邀聰聽今正是時願王垂幸王曰善哉昨夢手持九鈷金剛杵日輪懸空星月黯淡大地蒙光定兆至祥尋往花所見白紅蓮花上趺坐小兒容貌至美王問之曰父母為誰兒曰明了智慧以為父歡喜慈悲以為母不生不滅以為地內外瑩澈以為心空有不著以為食降伏妄念以為座作是語時王大感傷王臣啼淚悲泣因名之曰磋結朵絜海生金剛義也將蓮及兒并載入舟一切水鳥歌囀啼鳴狀至難捨王舟遂行磋結朵絜以沿途所見卜隨去吉凶初見皓首牽牛驅之使耕遂感作王之苦有如是牛復見樹梢大小二鳥為老烏所逐迴翔四週小竟脫走遂感大鳥如王自如小鳥他日可設計潛逅復見草舍夫婦有二子一子撲死鼠子父母責拒入門遂感他日我違王令必被拒不納尋抵都門民眾鼓舞作大音樂迎奉入宮王以所獲寶珠洗滌磨瑩陳之高臺初祝第一寶曰當為吾兒先現宮殿於是如須彌盧眾寶合成山林宮殿寶座等事自天而降迺命太子名曰卑馬加爾波次祝第二寶曰願降眾寶滿眾生願凡來求者皆悉施予勿匱勿絕乃擊鼓宣令四方來者齊集國門置珠幢上以香花飲食衣服音樂鈴鐸繒幡羅列供養王沐浴更衣虔誠祈禱霎時狂風四起掃淨大地塵垢纖芥無遺次降百味甘露一切飢者得飽次降種種衣服一切裸者得衣次降寶珠金銀一切貧者得財次降宮室廣廈一切露宿者安居次降宮殿樓閣眾寶音樂并放五色虹光馬哈典渣大密法十八種秘軌五方佛母佛說沈噶納七種經先後下降復次達納果嗄地亦下降阿兌約噶經凡閱誦此經者多分解脫成佛述王取寶及大師降生竟夫奇花異草肇瑞表法白花開敷主出人王黃花主宰相紅花主出家學佛綠花主作惡犯戒有花名烏東娃那印度名稱貴為花王矌世希有達納果嗄開眾色花各別現瑞久矣大師示現從花王出花身廣大蕊瓣相距目不窮際花敷紅色花臍現阿彌陀佛心種啥字化為蓮花生大師具三十二相八十種隨形好神通變化不可思議十方護法五方金剛佛母六道金剛均散花供養文繁從略五方金剛佛母復現八方化身及十方如來加持讚歎十二大師為王太子前後之事迹大師神明深諳世苦欲遠憒鬧習於靜慮不將一使獨往荒林趺坐樹下時飛行仙三人空中而過為大師光明所奪不克自持遂墮於地見師相好具足光明無倫驚而問之大師不應樹神報曰尊者非凡毗沙門千子不及轉輪王諸子莫京三仙讚曰雖具微妙舌能述劫成壞欲宣諸功德亦復莫能罄右繞三匝恭敬作禮而退王覺師遁驚惶尋求乃於樹下得之王臨問曰戀美衣食人之恆情爾心何居掉首却避我願作僕慰爾不懌大師無已隨王回宮王召諸大臣議謀所以歡太子僉謂當速辦大婚乃問師娶何賢淑曰有妻如繩縛纏擾特甚且良匹難得王日輪選民女優賜金寶引之宮禁令師自擇師形神惝恍如癡如眩如醉如夢如天人愁現衰相仍捨宮庭回坐樹下王命師忖七日復命時師自維依馬哈母渣法軌堪用女人乃以書覆白於王謂擇女須生望族幽閑貞靜和媚柔順少慾多慧心口如一無瞋恚嫉妬善佈施解修持作事恭順勿違夫教勿阻夫願者為佳宰相真懶正承旨往孫噶那地訪求迨徧無中式者時值佛誕童女五百入寺燒香中有一女堪當其選真懶正詢其籍族姓氏并告來意女曰我為振渣果國王公主父王名振渣果媽寫我名婉槍儱早字達拉哈達王子尊意極洽予懷但事須亟偕不久彼當迎娶也宰相歸報於王并請早圖王召五百童女同來王宮各給寶珠一而以最大寶珠交太子自授願納之女於是四百九十有九女皆輪流低首而過勿敢正顏而覩太子者惟婉槍儱胡跪合掌白太子曰君面如滿月人相具足一見傾心足難前進吾願已償未識堪稱尊意否也言畢而泣太子報曰善女諸功德汝皆悉具足乃給珠曰可女持珠而歸王隨以書貽振渣果媽寫王曰久欽威德夙具福慧並聞殿下七寶中有女寶窈窕貞淑世間第一寡人有子蓮花化生相好莊嚴得未曾有匹敵令媛天成嘉耦願締良緣竚冀綸音振渣果王覆書曰捧聆鴻旨忭慰無任蒙君天潢寵儲俯納敝邑弱女忘僭崇攀曷勝慶幸第已許字達拉無由反齒若背其盟撻伐立至忍辱禍國碍難狥允方命罪深惟垂恕詧王語太子曰諸女不當選婉槍儱已字人奈何師曰人中女功德悉萃此女身選擇匪易安可捨棄莫如遣兵先圍其國伺女嫁時奪之王乃命真懶正率兵數千人往圍其都振渣果王聞而戒備臨嫁飭十萬童女與婉槍儱同一裝飾俱行蓋防鄰軍之來劫也宰相率師甫行王置寶珠於幢供養如前頂禮祈禱必得此女越數日感扎吽榜火四大護法共舁此女從空中來先蒞王庭將士後至猶以未獲為報王大悅以五百綵女侍衛更有內妃外妃再外妃三重圍繞數達十萬常以歌舞音樂種種娛樂供奉太子太子大婚後宮禁四周常圍以五色虹光一日忽感虹光中金剛薩埵現身語大師曰爾乃教主實非政王妃嬪娛樂非真乃幻一日可離便當棄捨爾出家時至當視綵女如死屍棄王位如敝屣王夢天暗無光日月俱隕日月宮天子及宰相均號泣千輻金輪七寶及寶珠等騰之空中化現七佛太子白王曰若紹王位度生甚少無量苦眾難即度脫願王慈愍聽我出家舉朝聞之咸來歸敬願求度拔王弗之許并杜鎖宮門不令外出大師意決中夜感四天王捧馬足踰城至南方阿順地噶烱容崆峒中修行越七日受金剛薩埵灌頂外成八法內成八法及長壽不生不滅法成就十三大師度化印度各地之事迹金剛菩提場之西南有尸陀林曰斯威查爾其地有天降極美麗莊嚴之塔無量護法鬼神之所圍繞人跡罕到飲血㗖肉魑魅魍魎蟠踞其中大師趺坐新舊兩棺之上一切護法佛母咸皈敬供養在此五年中胎卵濕化一切有情皆蒙濟度印度葬俗皆以布米為殉窮者石米疋布富者滋多大師先衣其布食其米既罄乃劈棺抉肉為食剝皮為衣蓋成就密法之甘露變也於是諸毒惡護法得稽首皈敬而聽命焉爾時大師照見印度嘎烏削國人民機熟特往度之其人深信外道未聞佛法盡屬惡性闡提大師殺其夫度其識神取其妻以為眷屬並傳其法故女人多信佛教國王曰阿爾迭其后因難產死葬之尸陀林大師劈其棺剖其腹胎中孕女猶生師畜而娶之王子達汝馬寫聞知大怒率眾持刀仗來擊劍拔弩張與師奮門師乃逃遁眾惡之號曰削兒瓦約落梟獍義也大師往沙顛地弘法星者司左普熟諳天文地理陰陽五行之學大師從而學焉又地名卑馬京有醫師其父名戳不遮曾親從釋迦佛受學其子承其家學大師亦從其學醫以為菩薩行處又地名惹阿嘎納有文人名滾絜匹里精通印度各地語言文字大師從之受學印度有技師曰木削噶馬精一切技藝生於釋迦佛在世之時大師見之年已八十矣遂從其學一切雕刻金銀銅鐵石木竹等並織染繪畫補苴修造種種伎倆時有女人驚詢其故大師曰非精通五明何足以方便度化普攝眾生令其潛移默化耶大師遇斜迦滅支斜迦信里二苾蒭於途問其何往答曰往扎加爾峒中紅石上向成佛阿闍梨扎巴海迭處從其受學大師曰偕往可乎二僧允之乃同見扎巴師大師請受出家戒扎巴曰我所知惟無上密乘爾欲出家可往阿蘇納峒中向釋迦佛弟子滾高求剃度大師曰師之無上密乘亦所願學扎巴曰密乘戒義師資授學必先灌頂乃為大師灌頂先授以身口意五種灌頂次傳不動明王法及馬哈阿落阿兌三種約噶法次傳般若經并通傳外成諸經軌大師親見三十二佛現前成就悉地歲次在午七月八日大師至阿蘇納時釋迦佛諸弟子同夢見日輪後復有一日相繼經天異香天樂五色虹霓諸佛光明燦爛四表達於上下月之十日宿值參曜值日滾高尊者為大師說戒持地佛母來獻袈裟十方佛現身加持同讚善哉命名曰斜加僧伽迦葉尊者為大師薙髮剃刀刃捲磨時空中來四佛母取刀而去忽感扎一拿瓦金佛母取而棄之空中墜地生塔頂出寶劍半截今猶巍然存焉迦葉為苦行頭陀佛在世已然比大師出家猶比肩共事滾高大師異而問之迦葉曰彼年雖輕事佛日久所聞特廣故師事之大師遂問佛住世年譜於滾高尊者滾高曰我所傳法悉佛所宣佛處王宮二十有九年雪山苦行六年調達事佛於年約地二十有四年佛語之曰口演妙法如懸河無益明本心性乃得調達怒曰我外而相好內而智慧皆同於爾惟爾身有光畧異耳我恭敬承事者亘二十四年毫無微妙可告於我爾實淨飯王不肖之子時菩提場諸弟子盡來皈依於佛佛令我為侍者調達棄佛他走尋復來詢於我佛於彼何謂我云佛說爾七日後當死死後墮餓鬼趣調達不信六日不食口渴腹大佛往救之東來西背南來北向終不得面佛以音聲教之彼以手掩其耳我承事佛二十有一年歲次在卯佛於金剛菩提場娃那納寺乃傳大法所傳般若經典密教儀軌廣如經軌所載茲從畧先以顯密二教及菩提心三者傳於天人龍王等佛謂護持我密藏厥為大勢至顯教與外密於今亦已傳我無上密教文殊與觀音勢至三菩薩將來傳此土歲次在酉子月八日中夜佛般涅槃時年八十有二大師出家歲次在午去佛涅槃時十年於滾高尊者前受學五年遵顯密次第循序漸進外相威儀類似成熟自性解脫未達畢竟雖無漏真空已得解於顯宗之滾高而樂明無念猶待證於密部之勢至云大師復問滾高尊者曰師結集經藏都為若干卷藏於何所尊者曰我所結集經典若以香象運載須五百匹當集成時天王龍王及主地水火風空諸神等眾羣相爭持後乃分別供養如般若經則由天宮龍宮分藏其他文繁不備述夫得人間之寶用之可罄若得佛說經典如得摩尼入水不漂入火不燒入地不朽取之不盡用之不竭逐處逐時皆有發現之機佛涅槃時囑累曰我涅槃後二十有八年有枉炎渣後八十年西印度有迭瓦仗烱皆可傳無上密教中之三約噶涅槃後四百年有龍樹菩薩宏揚二教後三百有三十年有松幾三瓦成就最大神通人皆信仰密教後五百有七十年有寫兒吽噶納後八百有九年有兩昆仲名未詳皆相遙應宏揚密乘涅槃後八年地名孫噶納有人從蓮花化生具神通智慧能降魔外能廣傳無上密法後五百有五十年有跛得薩埵與之同年月生者有貝馬滅札皆成佛具神通大宏密教涅槃後千有五百年拉薩地有格瓦金於孫噶納地今之康藏以顯密二教並傳其處面赤之人此地雪山包圍二教堪住世者垂二千有五百年傳法度生勿有斷絕以上述釋迦應化大師從滾高受學竟地名曰別卑尸陀林曰古納經塔婆曰若達納內藏寶珠外有龍天守護佛母圍繞外狀可畏內實莊嚴道場大師斜迦僧伽於此靜坐者五年有大金剛護法泥馬俄責爾及一切諸天鬼神盡皆皈依大師欲擇一即身迅速成就之法以為修習遂往悟門取引佛剎乃阿達魯馬諸佛法報身所在淨土大師向阿達魯馬諸佛得法曰單蒲遣即一切成佛總持門也又得朅磨契印即雙身法既學成得法名曰金剛手乃下降至葛爾喀地尸陀林曰賞朗若兒中有一塔曰噶拉噶大師於此靜坐五年傳法於主地水火風空諸天神地祇等因大師發菩提心成就名曰羅典却賒也施感騎象金剛薩埵現身右手持杵左手持鈴傳大師馬哈約噶法其觀想大意云一切地水火風空皆佛宮殿一切四生男女皆是佛身一切語言音聲皆是佛語一切想念覺觀皆是佛心析之約有五十萬法約之為十八法地名曰拔爾波即尼泊爾尸陀林曰滾佐則也中有塔婆曰札儱喀削兒大師於此塔前靜坐五年現忿怒身曰孫格札住調伏諸惡鬼神及外道等以上述大師示靜慮調教迹竟地名曰果巴冷左蒲宮殿圓形有法身法報身報身報化身化身化報身皆具足成就之佛曰滾杜槍有佛母抱持現雙身相於獅子座上大師見之學顯密二教法爾圓頓契證之法分別為二十一類約之惟一曰禪那法即色空不二自心如如不取不捨三業自在法爾成佛法門大師修學通明乃下至殺火爾地尸陀林曰蘭噶在塔婆曰兌也遮有具神通諸凶惡護法圍繞其中有海容諸毒獸若鯨鯉豹馬等甚多陸地虎狼獅子亦眾大師在此靜坐五年傳法名曰卑馬三巴娃金剛薩埵之大弟子曰格那蒲朵絜匠巴爾顯捻大師在二師前盡學其法其最著者曰阿兌約噶其他即身成佛種種秘訣亦皆修學地名烏經約爾尸陀林曰卑馬在中有塔婆曰囊中朗阿凶惡護法鬼神所守護大師於此傳法靜坐者五年名曰孫格札住有佛母曰寫枉磋傳大師降魔及雙身法復次尸陀林曰真懶度巴大師名曰日典迭瓦仗烱容大勢至身化虹霓若有若無一頭二臂左鈴右杵傳大師阿落約噶法通用者有九特要者十有五分別演之為十萬壹千約之為八者有二種為四十者一種為八十者一種並傳三昧耶菩提心及苾蒭戒品等全法上述即心即佛之法竟地名曰雷約尸陀林曰果噶在大師處此度護法及靜坐者五年名曰朵絜卓羅有佛剎曰喀覺壬真利崆峒名曰得欠桑朗母委得磋佛母名曰麗結枉磨且夜住於峒中房舍間架全用人骨結構大師欲入參拜門掩未啟見骨馬利女侍者坐門外石鼓上手持利刃作項項聲大師求為通報女弗應欲稍移其石鼓則石與地接莫可動搖女怒以手中利刃剖大師腹腹中出現五方佛女曰爾成佛者有無瞋恨大師禮拜曰瞋恨絕無願求灌頂女曰我乃佛母侍者灌頂未能引大師入見佛母坐蓮花日月輪上身具千輻輪相光明徧照繒幡幢蓋眾寶莊嚴大師拜求外內密一切法要佛母曰密無師承不得濫學宜最先灌頂大師乃求一切佛現前金剛喇嘛灌頂佛母作哈哈聲曰甚善乃為大師灌頂大師自見一切佛入其身舉體變成吽字佛母吞入口中自身成為觀音化身復為灌馬哈母咱頂大師一切義理開顯觀音報身成就復灌馬王佛頂大師三業清淨慈悲現前微細惡念了不可得成就馬王佛降魔忿怒悉地復次地名都果果巴宮殿曰果巴仍佐大日如來所在之道場也有一切佛金剛灌頂喇嘛曰壬貞朵絜曲拉蒲有男佛女佛音樂虹光圍繞傳一切佛秘密奧義於大師成就金剛喇嘛傳法灌頂阿闍梨於是化身說法講經八種外密灌頂報身受用密八種內密灌頂法身根本密八種心密灌頂皆悉成就爾時一切馬哈母咱王會成一金剛宮殿所有一切雙身法求財得權統領護法降伏魔外諸多秘法悉傳於大師名曰朵絜覺落印度有地曰深林其山峒曰紊烱容有王太子成佛曰寫爾孫哈處在其中大師往參聞佛音聲相報曰欲速疾成佛當問此峒中師大師禮拜求之寫爾孫哈以食指指天空曰我成佛惟此一心不亂一語無別餘法言畢不現地名曰剎那尸陀林曰賞千若巴有內部莊嚴外現凶惡護法守護之塔婆曰噶巴達大師於此靜坐五年名曰通稱咱蒙釋迦應化時曾來東土五台山傳法漢人無相從者佛乃回印度觀音曰無已惟有一法乃以文殊化身傳天文輿地陰陽五行星命占相之術此土復無從者至是大師乃化身為四頭天王赴五台峒中親見文殊學成教世漸傳於漢地爾時印度邊陲人民酷好殺生大師化現一力士殺害諸凶惡輩人民乃懼而為善戒殺行慈大師思維作惡者眾一一度之事倍功半非現一忿怒相不足普化一切時有大尸陀林曰蓬儱納戈有極毒厲外道常住其中名曰喀納滅巴其門前有大旋風風中旋出如雞卵大之火光有拂其意者肆行荼毒活飲人血毫無慈念天龍鬼神亦受威伏大師現大忿怒相而調伏之羣眾盡皈依大師乃肅清兇暴并傳一切降魔經軌名曰朵絜札戈渣兒印度札戈蓬布兒野佛說般若之處也大師特往視察并巡行往昔行菩薩道所化諸地因此時已滿足一切佛法對於魔外毫無顧慮亦非岐視而有間隔蓋大師身猶人身心即佛心凡有誹謗闡提惡行畔道者大師視其法爾本心去佛甚近顧示之如未見言之如未聽其心酷望益己其行皆自尋其苦欲益反損自陷因果拯救不得實大可愍復視察殖民當顛地彼諸天女空行母亥母及九曜二十八宿等舉皆皈依學法復視察殺火兒地諦觀其王王朗勁因緣成熟王有后妃三百有六十輔相大臣亦復熾盛無子有妃名曰好列夢天空八日齊出徧燒殺火兒全國自頂生出一塔綠松石成遂感有娠而舉一男王極欣喜及醒白夢於王旋果有妊及生乃一女也王斥其夢為偽好列曰我夢非偽女宜占察延相人者仙人至以藥水濯女身視之泣涕妃驚問曰是何不祥耶仙人曰此非人女亦非天女具相三十二隨形好八十乃金剛佛母之所化現出閣當配金輪聖王不字即能度一切眾生者名曰面達納娃長甚美艷印度震旦郭爾喀尼泊爾諸王俱下聘求婚王甚難之莫知所裁乃聽女自決公主誓不適人若強己惟逃與死耳王怒不允限三日復命公主自忖曰幸生帝王家堪自在學佛適人事翁姑此身終被縛不向人中度來劫安可卜我必學佛遂詣王前求滿所願否則自裁王仍不允勅五百女晝夜輪守若有疎虞則罰以生飼犬食王之庖廚由三百六十妃輪值司理每飡必肉適好列當值市方乏肉妃無已遣面達納娃覓之途次得一新尸割以奉王王食已身輕騰空心開悟道召妃扣其故窮詰之公主據實以報蓋此尸為戰者嗟登之軀密乘七地菩薩之解脫身也食之者皆獲解證王亟命覓此尸回取為丸分給臣工食者莫不成就得丸者貯寶瓶供之或埋之石罅崖穴或置寶篋壁間什襲藏之面達納娃日常遊園一日乘間竊走侍女孫屑馬隨從面達以身飾珠寶賜侍女令回已決出家侍女勸之返面達堅拒侍女畏罪同行面達乃望空四面八方下拜碎珠寶為粉裂衣繒為條斷髮劃面供養諸佛祝曰願世世生生不生帝王家遂奔破粗察兒地着粗布衣禁語苦修飢食泥渴飲水孫屑馬不堪忍受乃返報於王好列聞而涕泣王大怒召女詈之終不聽王對諸國使臣曰我女終身不嫁盡卻其聘禮使臣齊曰若再聞公主適人必舉兵討食言之罪王乃請跛得薩埵至為面達說皈依公主從其出家守戒其侍女五百亦隨剃度王為築一室杜門下鑰惟許每後日分得往園中經行以為息游大師時至達納果嗄地傳法照見面達度時已至歲次在申亥月戌時面達園中閒散忽見空際五光十色虹彩繽紛雲擁菩薩年約八歲貌如滿月趺坐蓮上面達見之驚喜幾絕五百女眾各執寶幢幡蓋延之下降並請菩薩升寶座大眾禮拜恭敬圍繞啟問菩薩父母為誰大師曰父為非有母為非空我為不生不滅為度眾生故名曰得云無作隨眾生心應成熟緣如願示現隨機度脫我即彌陀觀音之化身於達納果嗄海蓮中化生成佛此即彌陀觀音與大師配表三身之從來也遂為彼等傳三種約噶馬哈阿落阿兌方大眾迎菩薩時適被牧牛兒窺見遂毀公主為不貞言空中有人入其室屬耳傳播由微至著漸達於王王厲聲詞斥好列聞之疑信參半欲究其底蘊王使人執旌巡於路露布曰誰作證者速投首男擢顯官女榮封命牧牛兒出首為證王曰斯何可戲論事若實者求聘諸國當興師問罰於我牧牛兒具述所以好列馳往勘察以門深扃扣未得啟疑定有異駭絕久之乃甦王怒命使者劈門執之來使甫入門見大師坐寶座上公主率眾宮女環跪聽法返報王曰男者非人佛耶天耶臣不得知臣不敢仰視何論拘執王不之信勅備材木膏油掘峒覆棘以備焚男幽女更令宰相執之亦不果至王怒熾盛旋命武士縛大師與面達俱來武士去時牧牛者同往謂公主曰任何國王皆不之許何獨鍾愛是耶面達曰此我師非我夫也爾何鶻突至此斥阻不聽遂就擒王命將二人幽之峒中峒口覆以荊棘茅茨桎手梏足頸繫草繩絕其飲食亘三年不死復擇兩河匯流處之平原通勅舉國人民各輸紫檀木一石胡麻一升限期運到集積成阜乃提大師裹以樹皮蒙以獸革束以粗布塗以脂膏置之阜上更加材木縱火四面扇之火作眾散時感十方諸佛及阿達魯馬三世諸佛驚歎稱奇及諸金剛佛母護法神祇倉皇奔赴掘洞於下降霖於上羣相扶護七日烟焰不絕若常人三日後煙爐都息王以為怪遣使覘之見所焚地成一內海四周火燄圍繞中生蓮花花上趺坐小兒約八歲許膚如白螺作寒慄狀天空覆以五色虹彩有八天女歌舞音樂禮拜恭敬環立擁護使者傾誠向慕驚訝難信疑夢疑癡返報於王王親諦視心大疑惑頻拭其目以為昏花大師曰我為三世成就如來耶為鬼王耶為絕貪癡因枉受罪報者耶為荼毒無辜者耶為撥無因果怙惡不悛者耶於是王大慚愧搶地呼天宛轉於地悶絕復甦人民携老扶幼絡繹載道爭先快覩蜂擁蟻聚有若堵牆王乃五體投地涕泣懺悔願推位讓國奉太師登極為王自甘臣伏而為弟子如囚如虜凜遵大命爾時釋梵護世曰天王等或來稱讚大師功德天樂齊鳴花雨繽紛大師告王曰我心如太虛不隨毀譽以為瞋喜我心如須彌內外瑩澈安住不動我心平等分別念息來去跡絕我心方廣豎窮橫徧無往不如王能懺摩我心愈慰歡喜隨順王亟命宰相取王衣冠運王輅輦率侍從儀仗兵衛來迎大師今大師曼達那像繪王衣王冠者由此出師登寶輅王親御之回鑾升座王面縛帶紐再拜謝罪大小臣工朝參禮敬而皈命焉王詔公主出峒并引咎罪己為啟禁錮而出面達面達默然宰相至不言母妃來慰亦不言相及母妃俱淚下面達乃曰請勿復言父王勅治我罪二十有五載刑期未滿我何能出眾宮女輪流勸慰不許如故王親慰曰我大誤謬汝師為佛無知冒觸並殃及汝汝實無罪願恕於我爾時面達至大師前恭敬禮拜讚美大師三十二大人相八十種隨形好一一稱歎畢大師告曰所云佛者即是自心不加對治則散亂不明自性則馳求外境苦惱現前即功德成就而不自知不取不捨如草生芽勿助勿忘自漸成長王以國璽及公主並自三業盡以供養大師並授之國柄自執弟子禮而承事之大師隨為臣工庶民傳無上密教及一切佛法舉國咸知大師究竟成佛殺火兒地徹夜光明爾時求聘諸國以王寒盟發兵問討最初來者為馬哈把納國王其兵將臨殺火爾臣民焦灼張皇無措有勇於敵愾堅甲利兵準備迎戰者大師曰勿妨親赴阿修羅宮借其弓矢象馱而來弓未上弦弓及象奇大世間無倫大師致馬哈把納書曰我弓身量非人力所能張弛但弦未至君其稍待馬哈答曰且待弦至再議已而弦至大師試弓安弦張弛自如操縱射擊儼若游戲敵人舁弓試之無能開者將士懾伏罷兵而歸其他諸國繼踵侵伐如上震懾遂皆退卻更有敵國欲見用弓矢者為何許人大師呼納呼納至大師護法距肉眼不及見為里者凡四置鹿角為鵠連射中的無虛發敵人驚奇怯走亂既平王請大師傳簡要法非繁非難苦心修持容易取證者大師曰王為人主驕奢淫佚習與性成無上妙法驟難相應如陶器未成盛水滲漏必先灌頂加持如火候至陶成堪用乃為王灌頂王發願曰有一眾生未度誓不捨之成佛護大師法隨逐不離盡於未來餘宰相大臣念餘人亦同發心大師先後傳授無上密教最深秘者期年面達納瓦就大師座前五體投地九頓首而坐合掌恭敬次第請益初問顯密差別云何大師曰顯密二者如陶成諸器其質全同其形各異次問佛說先以欲鉤牽次令入佛道其理云何大師曰眾機有異頓漸不同根行不等受解緣別故諸佛方便設教隨機示導次問外熟與內熟云何分別大師曰二者當視最後果證功用如何以為定準次問聖凡雙身其義何居大師曰唯有及非有空及非空之別耳次問生佛云何有異大師曰異在明與迷耳次問宿命大師所答甚詳文繁從略殺火兒度化史竟王薨其子滾穹嗣位大師與公主齊願成長壽佛永度眾生忽感四天女共舁朅磨杵杵十字形各持一端凌空而至大師與公主偕坐其上至德興雅噶地馬拉得噶峒中修持三閱月感長壽佛現身灌頂大師成就金剛湼槃舉體化為虹身眾生無盡大師不滅常住二九少年之相亘古不遷又至印度果達賴火燒地修無上密法者十有二年其王曰若瑕日巴於大師前備極禮敬供養大師往哈哈住尸陀林所見許多食肉猛獸飢不得食大師悲愍捨身飼之無何身如虹霓羣獸仍不得食大師諦觀諸惡獸餓死後將墮地獄濟度益艱思覓一人身飽諸獸以度之時王女曰緬點仗磨宿世亦毒獸食大師肉感生人趣者但於佛法未起正信大師化身為雷烏列食肉獸似兔形飢不得食負其子置崖穴中藏草覆之旋崖崩石墜其子壓死女適覩狀起大憐愍善根發現而來皈敬大師為說宿因亦從畜道來生人趣令應捨身還飼畜類仗此功德速得解脫當生雪嶺為王名曰松貞扛波當娶文成公主為后令所度者或為爾宰輔臣工或為爾眷屬士庶印度佛法將次第北來有承事於爾者有修成作喇嘛者爾時建喇嘛寺可二百所公主聞之慨然取决乃捨其身飽諸毒獸明日大師見王王述夢不祥知女有變尋之塚間見殘骨問有送葬者新至否路旁人答曰無之王痛幾絕大師為說公主因緣王起深信人民歸敬者眾印度有地曰滅都及巴王曰阿屑噶深信外道其教宗分二派相攻擊水火者二百餘年常殘暴其民害及佛弟子時大師靜坐峒中觀王因緣成熟現苾蒭身募化王庭王怒叱之命縛大師設大火聚煎鼎鑊油赤身投其中經一晝夜不絕火次日觀之彼油鑊中生大蓮花長二丈許募緣苾蒭端坐其上王大慚愧問如何作法消滅我罪苾蒭答曰於國南方一日夜間造佛塔婆一百萬所民貧苦者普濟衣食罪乃得消王曰施貧不難惟一日夜百萬塔婆如何可辦苾蒭曰誠非人力所堪當往菩提場祈禱於佛或得方便王如說禱求百萬所塔一日夜間由護法菩薩神力扶助故果爾成就國中貧者咸受施福此大師度阿屑噶之因緣也印度南方有地曰格達其尸陀林曰扎瓦主姑大師修行其中國王曰甲爾波左蒲善解醫方通曉天文輿地諸學有二后妃各生一子王謂二子學業精者即傳其醫立為太子長者好學幼者年少后復溺愛以不得紹位為憂幼者曰我有方便母勿慮乃造扎瓦主姑叩大師前求授五明遂通內外典籍學成后喜而禮其子王命二子相考問較知解以定優劣為設同等座位令其對辯召臣民咸集觀焉長者論醫有三百次第王及輔相輕幼者齒稚臆决弗如遂定長者為君儲母后大悅幼母竊憂之幼者論醫宣說乃至無量部一切天龍八部咸於兩足頂禮恭敬稱歎不已王不得已擬分國權為二並傳之幼者曠高不願為王推位出家法名曰斯的怕那爾時印度最大喇嘛寺曰咱馬謝外道寺拜日輪者曰捨兒斯兌常以兩拳擊胸冀修自身成日輪其觀成時目光所指即成灰燼被焚佛寺無算焰薰龍宮龍因之病龍曰羅兒疾曰洞烱俱化人形向斯的怕那所而獻寶珠以三事為請一求醫病二求智慧三願獻佛說大般若經斯的允如所請往彼宮中龍病得瘥受其寶珠及大般若經歸大般若經遂於印度出世共稱斯的曰麻哈阿渣里亞那甘作拉復次有地曰孫噶納其尸陀林曰搿札納大師居其中其國王曰希兒果馬國中外道熾盛常起戰爭燒毀寺廟與民舍宅王園囿中有小海海中產蓮晝敷夜合獨有一蓮色紅苞大成熟多時而不開敷王飭宮人日夜守護已而敷發化現一兒趺坐其上年約八歲作寒顫狀王以問大師大師曰此兒宿名斜迦滅支為度化馬得展渣故而現其身馬得展渣為修學外道成就者即象頭王之弟也王名化兒曰阿仰得瓦於龍樹菩薩前出家孫噶納外復有別達納大師應化此二地者垂二百年印度有地曰蚌噶納王曰羅跛甸破壞佛教大師令面達納瓦化為無量鼠子竊其寶珠又化出十金剛杵擊斃其王及其臣工大師蒞臨傳法度王等神識生西大師自為王彼拜日輪外道餘孽至此調伏殆盡大師復視察往昔有因緣地曰烏經恩漲波迭王遣使臣捨兒阿覺埒至延大師往其國弘法使見大師佛母相伴生疑誹謗遂止其請大師權施方便化為金剛具七佛頭面騎大虎化面達納瓦為三鈷杵手持之身纏毒蛇名壯別海爾噶聲言於眾曰誰為信我佛者人以為偽扮不之信遂往不拉洒酒家沽酒五百斛痛飲酒兒不拉洒索直大師曰日落付直隨以手執髑髏幢擊地日竟麗天而不西沉一切處咸感水竭泉涸樹木枯槁乃至么微蟲蟻燥斃無算烏經王曰尚節直瓜召臣工及百姓至窮詰其因任誰莫解不拉洒白曰是我家行者所作尚節王親蒞酒家質之曰爾為佛徒何惡作劇大師曰日若西沉我無從付直奈何王代償其直日遂斜西回計不夜者亘七日矣大師旋往住古汝古里峒中并為王傳凌空能飛入水不漂之法王供養大師象馬諸珍爾時恩漲波迭王忽被毒蛇所嚙醫治罔效求於大師竟爾得痊大師復化為納瓦巴身形同乞丐將一窮婦面達所化故往達納果嗄都市而過人民彷彿識之曰昔捨妃嬪媵嬙而不欲今將丐婦胡為執以獻王王以出家行者不應與女人俱令民聚材灌膏投大師及面達於火焚之儼同殺火兒故事煙燄亘三七日不絕王驚奇欲往視之左右皆曰不祥不願往王固令覘視見樹燒為炭油熔為海中出蓮花花上坐雙身佛相好莊嚴諸天護法朝拱圍繞恩漲波迭由慚懺而起敬信度化人民甚眾號大師曰卑馬湯稱王遂以無上密法而得究竟解脫大師復至阿妥蒲地現出家行者身所卡迭瓦地有貧者葬其妻於尸陀林妻生有一女未及免懷幼哀失恃父棄之合葬於母大師救之名曰噶納納得挈之所卡迭瓦地修用佛母法一切人不之見獨牧牛者莫兒布果列見之朝夕取樹芽漿汁供養大師大師問曰爾供我何為牧者曰我深敬信於師大師曰我傳爾法願學否牧者曰固所願也惟乏供養不敢請耳大師曰所供樹汁便是命次晨來學明日遂為傳單身金剛薩埵法灌頂時面門即現吽字命其名曰吽青噶納大師隨為傳無上密法身成凌空行口成馬頭明王心成朅磨杵功德成黃光技能成五色光人見之皆曰金剛薩埵至矣彼避曰我為牧牛人眾仍信其為成就者阿妥蒲之西有信仰回教地曰噶爾喀朗波扛王名達魯馬阿屑王女曰達魯馬別兌年英而貌美夜夢身有白光者以寶瓶甘露來灌其頂感身悅豫而妊既生子埋之河濱沙中爾時有大富長者曰得典可落忽見犬口曳一兒身蒙塵垢目灼灼有光乃將之歸囑其夫人薩能馬養之長養至速月敵一年五歲出家其師曰卑馬噶爾波其剃度法名曰斜迦寫巴扎爾其後成等正覺於五台山云復次有外道地曰常林中有五百外道與大師諍論不能勝謀害大師爾時有佛母曰頓奪兒馬授大師降魔諸秘軌大師修其秘法中海爾噶堪作母成就以雷擊死諸多外道其幸免者盡求皈依正信佛教有地曰孫林王信外道后及太子俱歸依大師而得灌頂學法王惡之築一室坐大師於其中而焚之全室忽化為塔婆宮殿后及太子俱在大師座前恭敬聞法王乃皈依並率舉國人民正信佛法其餘諸國如噶馬日巴雷約兒馬奴阿嗄作嗄相巴納相烱用達啥克妥噶爾等處大師共興塔廟至八十萬所廣傳佛教復次中印度有國王曰果葉強覺篤信外道倍極兇頑有外道師六人管領金剛菩提場活食眾生血肉毀佛經像塔廟用兵數十萬日尋干戈從事殺伐人民死難者盈野載道日以八十萬計王剝削下民慘酷入微小至芻薪燃料亦取給民間並喜活食生魚大師以慧眼諦察厥惟格瓦匠比丘尼之私生子及噶嗄魚二者堪作度化捨此別無方便遂以神力為私生子灌頂子忽問其母曰誰為吾父母曰無子垢恥之願至金剛菩提場出家母不許曰彼王深信外道不可誤投子不聽逕往其都聞者阻不得入鎮日徘徊宮門外王適出遊幸見而問之子曰幼孤無依願求出家問其年纔八歲王嫌其稚子言甘為僕役王許之名曰典確的林乃服務王庭學習外道大師復化一噶嗄魚王取而活食之甫入口不及咀嚼魚輙貫喉而達腹穿腸裂肝痛心疾首目出眦裂宛轉於地后及宰相等急延六師診救修護摩法并製藥誦經方張皇間典確的林以毒藥塗大樹縱火焚之火勢猛烈全成焦土王及外道咸罹於難獨典確的林逃出爾時金剛菩提場無王人思擇主而事之印度擇王法素决於象用寶瓶繫其鼻端巡行於道瓶灌其頂者即王之期年後象忽為典確的林灌頂眾擁戴焉以無后故眾謀於王王以信佛者為佳臣民奉命徧尋弗獲乃仍用象决之法未幾果擇一婦年老於王迎居內禁印度古制王大婚寢殿未成義不相見既而殿成王問后曰噶烏削地有母曰格瓦匠其子曰典確的林者爾知之否婦人泣曰彼實我子已火死於菩提場矣王曰我即典確的林爾即我母婦人不信王曰我本大師化身撲滅外道拯民水火可同往菩提場檢驗果葉王身雖已死腹魚猶生往視果然婦人乃信為其子大師更以金剛杵擊火燒斷樹矢之曰我願非虛大師非偽者此樹當復生否則斷焦如故言已菩提樹果爾復生於是重興菩提場主持政教者垂二百年大師曾於印度尼泊爾之間匠來屑崆峒中修雙身法有佛母曰拔摩斜迦造瓦為母死猴乳之女大師用之得大成就一切毒獸厲鬼咸來吞噬侵害大師盡調伏之所有各地戰鬥癘疫牛馬諸瘟人禍天災一時頓息並藏秘軌降魔杵諸法器經典於石罅中以為將來應用大師成就三昧恰如今畫像所傳著王衣冠之式其化身略有二十一尊其名曰卑馬重功咱納枉葱功主威若誅卑馬千確札爾堪珠枉確果波別爾瓦巴納波覺烏且威穹且穹喀丁札薩拉哈卑馬阿布達卑馬滾肚覺卑馬槍確札卑馬卓威假蒲卑馬逞林功卑馬峒約斜瓜卑馬日幾我確卑馬壯別巴日丁卑馬噶爾波卑馬別札卑馬通稱札爾徧化印度各地其經典法器寶珠等則付囑地水火風空中諸多弟子流傳後世並廣佈各地茲從略不具述大師復至尼泊爾曾住查瓦查屑之典每克仍末乃冬暖開花之地有普爾巴諸護法等盡皈依之又至果嗄真顛地居於布拉哈惹峒中初夜有金剛手菩薩現身語大師曰此方國王喜修息災免難之法若坐於尸陀林西南方樹下可感得妙法以資應化大師往坐樹下感九頭巨蠍每頭三目具十八鉗安住火中大師見而求法約以翌日及期往見地面有三角石去石見峒內有一箱得普爾巴諸經軌有九種及十八種降魔諸法普爾巴梵言格納雅金剛薩埵忿怒身也爾時菩提場之王曰尼馬孫格尊大師曰馬哈班者達迎請法履常駐其地以施教化普利羣生十四大師西藏應化之事迹西藏佛法以何因緣而熾盛耶緣藏王赤牒主顛曾延聘漢族白傑其人者廣傳天文輿地醫卜星相諸學娶唐肅宗之女曰金城公主者為后好合既成后夢麗天果日化為佳兒入其腹中爾時天雨寶珠大地光明五色虹彩炳燿霽空覺而告王王喜甚娠後身輕無病舉體充悅孕九閱月有十日當巳年寅月值宿在鬼日出之時分誕生一子王請白師推察命理據云甚吉凡所願欲皆得滿足兒頂髮右旋齒牙整骨所成爾時西藏印度震旦國際聯誼如橋續路靡有斷絕因名之曰赤松得真年十有三父王升遐越二年遂即王位娶后妃二在位七年征服不庭諸地年十七即信佛法因讀其皇祖本紀內載其先王曰妥妥列真者乃大勢至化身即佛教初至西藏之時顯經曰榜鞏槎加巴十善十惡因果經也密經曰馬哈母咱大契印之秘軌也皆自天下降初不之識惟供養禮拜者感長壽無病吉祥如意至第五代王曰松貞扛波即娶唐太宗之妹曰文成公主者乃觀音化身於藏中諸地修建廟宇都百有八所迎請唐所供釋迦優填王所造像印度銅佛并自塑觀音及他佛像以為供養始制文字翻譯大悲準提各密軌及顯教諸經云云王讀已仰慕祖德思纘丕緒亟欲措手宏揚佛法擬先建一供佛寶殿竟為權臣所阻王反覆思維乃曰朕慕祖宗功德必借土木之工以作佛事藉報祖恩一鑄銅管引水入宮二於三覓海波日地造一水晶塔婆三掘地為穴滿貯黃金四修築廟宇供養佛陀四者必擇一遵辦否則朕願退休大臣白曰銅產不豐鑄管難成水晶無巨塊塔婆難營黃金有限地穴難填三事多礙敢方王命築廟供佛庶幾可能於是漢族白師為王卜地繪圖三明葱蒙葛爾地中有一平原曰翁布察爾占之甚吉毫無風煞曾載堪輿原理文繁不具地既定乃鳩工庇材經始工程無何藏地鬼蜮為祟阻撓修築晝所建作夜復亡失屢修不成王命圓光禱神及請殺火兒地喇嘛入藏誦經以為祓禳遂遣大臣三人為使夾威若助赴殺火兒斯達然渣赴印度竹果靄巴赴震旦夾威若助初至殺火兒時語言不通人皆掩口鼻而視之僑居數年漸諳其俗知有政教二王各事其事不相為謀政王太子出家名跛得薩埵又名現短得瓦解行雙超在殺火兒地稱為第一返報於王王再命二臣曰把門假拉屑納及假拉果馬惹阿將黃金多升為贄以樺皮寫國書曰大教王睿智聰明富有顯密秘藏如日經天無幽弗燭敝邑僻陋猶處昏闇屢思營佛制多終為魔蜮所持聞貴庭大阿闍梨曰跛得薩埵學究五明慧通三藏業廣德崇眾所欽仰願降慈光辱臨敝邑普利羣盲藉蓄薄德遣使齎敬惟鑒照不宣二使奉命疾行假拉果馬先至國書黃金已達把門假拉屑納途次為盜所劫跛得薩埵得其教王同意惠然來藏與藏王談次甚歡先傳三皈依并每日誦經歲次在丑正月中浣佈置廟宇王躬操金鋤掘彼土壤深量一肘跛得薩埵誦經地土呈白黃紅三色王親嘗作甘之味并頂戴戊己之功跛得曰大吉祥能滿願爾時基地有龍神久宅大樹下恐伐樹侵己大邀空神齊來阻難工程晝作夜遷障碍如故王謂跛得薩埵曰朕業障深重建築之事恐不果成跛得曰我為依顯教發菩提心而取證者調伏魔惡非我所長現金剛菩提場有馬哈班者達曰蓮花生為密教之大成就者深諳誅法善伏魔外鬼蜮聞其名者咸皆戰慄是三世之大寶十方之旭日諸佛之真身眾生之慈母也王當延致以利民福國王曰朕極欽慕但慮莫我肯顧跛得曰我三人等宿世有願仗此因緣决其必來王問其詳跛得曰往昔有四昆仲為愈母疾而建塔婆伯曰願此功德來世為王宏法利生仲曰將來學無上密成佛以化佛威德調伏魔怨叔曰將來出家守戒發菩提心宏佛經教季曰爾等願滿我為宰相於中聯結和衷共濟彼伯者豈異人乎王身是也仲者蓮花生大師是也叔與季者我及今宰相把們宅結爾是也爾時斯達然渣歸自印度復命於王曰印度法師有若天星不遑枚舉惟雅魯拱批山中有化生者是為第一王聞之喜乃遣使臣四人曰把門宅結爾曰朵絜短覺蒙曰斜迦札巴曰巴結爾僧格同往中印度菩提場共將黃金三升以其二分贈尼馬僧格及諸班者達餘一分贈大師聘書鏤之金版略謂發心修廟屢為魔持晝築夜毀莫底於成佛力無邊師威叵測願求加持去障伏魔特遣使臣恭詣法轅希速蓮輦來蘇霓望大師閱竟慨然允諾於午年九月望就道晦日抵尼泊爾大師語使臣曰西藏魔魅熾盛鴟張跋扈我徐來調之爾等父母生身難堪荼毒宜身佩佛咒先皈報王我當嗣至大師住尼泊爾凡五閱月并傳法於王及臣民等未年三月朔大師將起程時尼泊爾一切樹木花草皆低折北向西藏大臣等夢日月并出印度經典盡往西藏西藏廟宇大興空中佛母及護法皆挽留大師不捨此土大師曰此時佛法如屆盛夏草木叢茂我於此土緣盡度生時至我决行矣至忙約兒藏邊地皆屬荒凉大師曰佛法盛時後藏亦隸屬西藏版圖云藏地有小海曰尼馬可藏王聞大師入境預遣七人來迎遇諸途王餽黃金及問訊書並呈大師大師旋即騰空而去復至忙約兒所屬拱湯地住三閱月乃行又遇其來迎者大師故問為誰將何往來者曰王餽大師黃金及以書牘太師曰此乃王餽我耶取金望空散之見者皆吝惜不禁大師命各襝衣祴作盛物狀旋拾土洒投之其各衣祴皆盛滿金銀寶珠光耀奪目皆大歡喜復次忙約兒屬地曰多納喀爾有黑教大惡護法曰咱烏納扎們以兩石山夾迫大師不死乃求皈依大師命名曰朵絜有威馬次至懶湯喀那地有一神仙曰扛噶爾朗面以雷擊大師師以手捲其雷而棄之海海水嘯沸其仙肉去骨現復以金剛杵擊瞎其右目仙求大師曰師是釋迦之再來者願求饒恕容我歸依因命其名曰瑕滅朵絜約總馬大師次至惡約擇磨地有十二惡神各發十二雷來擊大師不中復以兩山來夾又不中十二神主僕各十二皆皈依大師而為護法大師次至惡約格擇倉總地有朵絜雷巴神有鑒於前先自皈依不與大師為難次至湘波地其神化為最大白牛鼻孔呼氣即降雪颳風大師誦札吽榜大其身被縛皈敬聽命焉西藏之最大主地神曰湯拉在後藏湯拉地化一最大蟒蛇頭在竹姑尾伸磋却也湯以恐怖大師師以槓擊之曰爾為龍王時名曰累列妥噶爾為乾闥婆王時名曰是壞阿巴我識爾名蟒即慚走雪山山雪立融見石再化現一小兒頭生綠髮衣白緞衣皈依大師法名曰朵絜取拉蒲札兒大師次至徧約兒地有神曰頂丁登若滅能使北極冷風一齊颳來打擊大師在途諸人被壓幾殆大師且有微感以火燒之雪山為之熔化乃皈敬大師而為弟子次至朗結徐董朗左蒙峒中念誦密宗經典七日最大魔魅皆率兵至大師不為動遂皆皈依次至西康地曰那瓦拉節有降神附體者皈之次至孫格札地有神道曰麻昌類似阿修羅者名曰雅邦結姐化一老者戴猴皮冠身在西康首困巴塘刀槍弓矢如雨墜下以擊大師師變身為忿怒金剛降之乃稽首率其眷屬盡皈依焉現西康有喇嘛云其第四代祖師曾述大師此相在某崆峒中啟峒果見一忿怒相類似泥塑云抵藏後凡所至處一切魔類盡皆皈依茲不具述大師至奪儱但布查兒藏王遣使候駕不曾躬迎該處距藏都約一日程大師駐此約王來會王以大師未將眷屬微生輕慢復自衒九五之尊不願枉駕以迎大師次住喀拉布札兒又住石鋪江布峒中二地鬼神無不皈依大師至奪儱水與雅魯藏布江會流地王遣其大臣曰納卜桑若巴爾率騎兵五百人齊集奪儱以迎大師宴時因去江遠方慮乏水大師以手指山壁泉流湧出大臣亟呼持融巴來盛水融巴藏盛餚饌器因名此地曰融巴納却泉流成河下注雅魯江王迎大師於雅魯藏布江濱百姓皆衣白衣有二后妃伴王并綵女伎樂齊來參駕大師自維我乃化生彼實胎出雖是文殊化現解脫未竟况彼主我賓宜先致敬我先禮者何以法後世王自忖曰我貴為天子不便先禮若如跛得而禮我者我當答謝王師既晤相持不禮而立大師曰我為三世如來化身一切經教堪能傳授我曾作大國主統馭兆民度生為重分身無量智慧神通種種功德我為第一不堪禮王王實蠻酋事理不明但戀肉食而恣殺牲嫌妃平庸慾心未厭不禮我者我慢實大我乘願而來非慕虛榮王以手揖大師曰師來甚善師還揖之火出燒王衣於是羣臣五體投地禮敬大師絡繹坌集爾時赤松得真王發大慚愧禮拜懺悔曰我障深慧淺親值如來出世不知承事恭敬願垂慈愍消我罪障大師曰石造五塔婆一時成功爾罪可消王從之大師於六月朔赴桑依地視察築廟情形大師坐寶座上跛得薩埵亦來同坐王曰我為面赤食肉者受度匪易思宏佛法築廟未成敢求大師慈悲助我弗逮大師曰西藏為眾魔蟠踞之地我所經過業已降竟王實猴種後裔能發心修廟築塔我心甚慰所卜廟基形似魔女當造九層樓閣於其臍圓形黑塔於其頂百八塔婆於其四肢彼麻作海有龍王宜先納交以為資助大師乃往若格噶兒地誦經并築一廟宇而歸所卜基地前有海若惹小山名也大師於其所念吽吽聲召諸魔魅至誡之曰爾等心狠壽促王修廟宇興佛法爾等頻作障難我為印度貴賓專為調伏爾等而來有腹誹者斷斷不許令施爾等一器淨食其諦聽我命為王護助若不聽者當重罰不貸大師乃身翔空中影映地上隨影波磔城垣基成歲次在寅六月八日日干在辰曜值在日吉時動工依曼達納作法布置壇城晝夜興建日用人力夜藉鬼工四天王為領眾率諸鬼神助其營造速率數倍於人藏地原乏森林大師誦經後所用材木皆由龍王神力輸送廟工未竣帑藏已空王問大師如何斡濟大師曰不難王本有龍王之友亦已代王納交於前矣大師遂召麻作海龍王至向索所需次日海現白蟒水勢澎湃金塊金砂汎溢海濱舉國人民取用不盡國帑大充因此顯密塔廟完成備極壯麗中央宮殿兩楹相去千有二百尺四圍城垣建築塔婆千有八百所中宮外圍以十六小宮四方四大門四護法四石壁壁上俱嵌銅鑄犬形起寅訖午亘五年而告竣廟堂供佛魔魅等猶負固不服大師請金剛手菩薩調伏之大師與跛得薩埵及王决定護法大師曰巴達火兒地有護法曰得噶兒將來魔軍破壞密乘助桀為虐彼實渠魁不早圖之噬臍何及今當先請其為特殊護法別建三寺以為供養王從之嵗次在午季秋之月諸像塑成王先禮請跛得薩埵開光越明年秋九月望月有蝕之大師修金剛法七日為王灌頂王復禮請大師開光初撒米時一切塑像皆外出繞殿三匝而復入其初出時王疑之慮身大戶狹之難出入也馬王佛開光屋頂射出火燄王疑以為火作也彌勒佛開光時有諸天供養文殊菩薩開光時天雨花三次大日如來開光時空現五色虹光其餘諸廟開光時空中現三朵花蒼茫林地廟宇開光時有佛說顯密二教義密宗廟宇開光時諸佛及護法來去不絕觕康林開光時有佛化現宣說妙法山顛林開光時天空日月並現阿雅馬林馬王佛開光時有大馬嘶鳴三次藏地普聞有處未得聞者因名其地曰枉巴林聾者義也譯經處開光時音樂不鼓自鳴說發菩提心戒處開光時空中現馬卡卑馬佛迦札林開光時一切佛供盡變香味別噶兒林開光時別噶林護法蒞臨現身供養飲食幡幢傘蓋四處並現十方護法開光時一切塑像出而遨遊然後還歸本位四石壁鑄犬開光時聞犬吠聲犬自動搖城垣三匝開光時天雨藏青菓五石塔開光時天現五色虹光見天人歡喜歌舞伎樂走馬拉薩古代房屋開光時奇異極多文繁不具大師謂今日西藏與印度菩提場差堪媲美凡大師修行之處其草木籐蘿花葉果實皆以三密加持他日食之者皆能成佛云五年以來塔廟告成大師與跛得薩埵擬同回印度王請二師坐寶座上供養金銀寶珠再拜稽首言曰朕年十三先王即世孤苦寡護十五即位為靖亂故多造殺業在位七載略解修持從事塔廟又屢為魔障如天之福得感二師辱臨殊勝護念膚功告成廟貌巍峩有若天宮此非朕德實賴師恩今遽言旋歸竊未敢許良以制多甫就佛寶肇基而顯密典籍未備法寶闕如願求大師常川駐錫廣譯經軌高建法幢惠錫光明用燭幽闇大師與跛得薩埵相謂曰藏人多信黑教經典法教輙不易傳王信仰平常未臻殷重吾等行後王必不悅乃共告王宜先舉辦國學令藏人習梵文與顯教王大喜詔全國曰自今日始政教統一我為元首若有居心叵測謀為不軌者當處極刑顯密二教聽民自由信仰青年子弟均須從師習字讀書聽經生兒須延喇嘛誦經所以消往業綿世福也有疾服藥誦經所以息災患求加持也死後超度誦經所以懺罪業助解脫也財不足者公家貸其母金力厚者償其原額窮者得償其半詐欺騙取按罪處罰國難外侮羣力共禦其子多者長者持家幼者入學男女嫁娶須憑父母之命媒妁之言不得私自營苟無故不得殺牲偷盜妄語一併有禁不得浪費財用應事接物一切以和平為主此在家者之準繩也出家者當遵師教奉佛三種戒律即三昧耶戒菩提心戒苾蒭戒是宜受隨相稱解行相應渴飲酥油茶及鮮菓衣紫色袈裟學密者必秉師承渴得飲酒食一切物聽其意樂衣着白黑紅三色居山峒中或自築房舍常自修持習顯教者悉依釋迦教奉行學密者依師傳儀軌如法築壇修持自在在家者有精美衣食皆須供養惸獨及貧苦者周䘏有加遇傳法講經者皆應恭敬禮拜黑教為外道業令逐出境外軍民人等不准學習違此令者立即治罪徒受師訓子秉父命幼聽長言上下勿僭違者治罰殺人者斷手足截耳目水溺火燒刀斬各按輕重處治鬥毆人致死者減死刑一等斷其手足或抉其眼目子女不得父母之命妄自苟合者治罰不悛者割其耳好妄語者逐令出境典物不予贖者罰石斗升合量而定值不可量者度之不貳其價蓄犬飼雞以司晨守夜約束身心如對明鏡常照勿忘大小臣工宜按其分位各受統轄而行膱權開山築路平治道塗以利行人疏河决港以便舟楫勿欺陵貧羸宜優蓄牛馬裒多益寡稱物平施此政王治世之大略也藏中青年子弟習梵文者先念四皈依以口舌鈍故念誦不晰王心不懌知經難翻二師熙怡微笑王曰所以敦請大師者原為宏揚佛法今誦讀四句且欠清白奈何大師曰王請釋慮當別圖之釋迦佛大弟子曰滾高者已轉身七世其第七世身現在後藏擇磨念磨正喀爾地其屋舍有九父曰巴果爾恆多母曰逞噶沙轉機子曰格迦湯達年已八嵗矣欲其出家其父母當能捨之命之翻譯是為第一復次地曰彭約噶瓦薩父曰噶瓦羅顛母曰朵絜假蒙釋迦弟子準達在此現身為其子曰嘠瓦把則蒲復次地曰想打兒馬扛父曰累葉匠烱容母曰正展則媽釋迦優婆塞弟子勒展白列在此現身為其子曰覺落落延甲蒙稱二子父母俱能捨者此大師以宿命智照見者也王聞之欣然往訪將從臣七人騎兵二十有五人躬至念莫正喀爾地其地人民聞王巡幸不解禮敬祇慄危懼匿室中不敢出日旁午有小兒嬉戱束帶而歌王問之曰巴果兒恆多在家否兒答曰出外尋多話去也復問逞噶沙轉機爾知之否兒曰知之現尋眼去矣復問曰爾為誰子曰父之子爾父母為誰曰是爾知者爾家何所在曰在是王教之禮拜兒即拜王喜其伶俐能言問曰爾願偕我去否曰願騎馬去途遇其父沽酒回母將油至王悉其故甚異之隨至家以來意告其父母其父母驚泣不許蓋慮印度之苦毒也王曰俟其長成再往印度非今即去也爾二人後事勿慮身資所住朕皆賜給速携爾子移家格隆王返都其父母率子隨至王優賜金銀格迦湯達在二師前出家名曰貝落渣那素食七年教以印度文字所聞輒能憶持其他轉世二子亦如說尋來與之同學於是二師坐金銀寶座上三侍者圍繞王坐其下以金曼達為供養而禮拜焉乃依經軌翻梵成藏起於丑年季冬訖於寅年孟春約十有三載大師授外密部竟覺落落延甲蒙稱所譯也次授馬哈約噶三部貝落渣那所譯也次不空滅罪金剛經懺悔經般若經湼槃經普賢行願品亦貝落渣那所譯次白傘蓋經金剛手菩薩經長壽佛經金光明經文殊一字經阿字內密懺悔經密密懺悔經所翻甚夥此略舉其概懺悔經二種王常持誦王壽止四十六嵗大師加持為延十三年大師授密部竟跛得薩埵傳顯部凡釋迦佛所說經已翻者都為數千部尚存三百餘部未翻王謀竟其全功擇藏中青年子弟未娶者赴印度留學其父母皆存姑息慮候熱多險而不果往二師共教成百有八人貝落渣那等七人同出家守戒王尊之為師其中受比丘戒者五供其金銀令往印度留學翻經第一次七人中惟貝落渣那與列左普二人先至菩提場從馬哈班者達學法翻經者次第承事凡二十有五師貝落渣那從寫兒孫哈學無上密宗甫畢思歸師曰宜稍待且修成蹋輪神足而後歸去可免沿途危險貝落遵命比歸至西藏與尼泊爾邊界果降大雪貝落以法制止而出險回藏王師事之宰相卿士等多黑教徒羣嫉而疑之謂貝落為冒名宜處以死罪方貝落赴印度未歸之先印度諸師夢見貝落携馬哈約噶諸大經而歸并拔去大樹大眾追之不獲又與貝落同去之古馬那卒于印度貝落一人獨先歸王供其金珠寶馬甚多王欲學法貝落曰我所學密法必以身口意供養乃傳王如其言而受灌頂彼印度諸師復來函譖貝落所帶經典為偽此臣工疑嫉之由來也王對臣等漫應之謂貝落已死實則用銅鍋函蓋二合置貝落其中沿邊密扣以釘舁至遠五十里外而脫之王復命造小室於屋頂密請貝落獨處其上令人民供膏油以繼晷晝翻顯經夜譯密軌王日暮必往后疑王有外御王以實告后宰相中權大者為黑教徒曰打納若貢聞之欲死貝落王曰放逐可矣致死不可汝不聽者當治罪王乃縱貝落往今雲南阿敦子地普傳密法第二次赴印度留學者為蘭格銀波等五人受學於印度吽噶納大師所有忿怒金剛軌及一切歡喜諸軌通學竟五人中有巴爾結沈格獨思亟歸師禁之弗聽行至半途果遇害王病幾殆大師言蘭格銀波若至王病可愈王乃請蘭格銀波歸國王敬禮學法如先印度仍來函相譖朝臣反對仍如前乃逐之喀却洞中蘭格銀波成佛飛空而去當貝落渣那往雲南時王問經多未翻奈何曰印度有二大師曰貝馬滅札曰補當古札當延之來貝落至雲南途遇一年老者蹣跚在道問其何往曰赴西藏求即身成佛法貝落曰我即是佛爾可諦視老人年八十餘眼啟閉弗自如乃以手揭眼簾仰視之果見毘盧遮那報身圓滿莊嚴之相立於其前乃大起敬信貝落即傳一阿字觀老人念誦七日即已成佛現今打箭鑪鑪定橋松盤理盤諸處皆貝落當日應化之區也巴爾結僧格卒於途宰相等疑為被印度人所害多所疑謗餘三人歸國携所翻普爾巴經歸眾見人皮天靈蓋骨號骨鼓骨珠諸法器等羣謂印度為食人肉國家王復欲翻經乃遣噶瓦巴止覺落落也姜稱馬壬清三人赴印度求二大師遂於菩提場五百班者達中求得其最優者曰貝馬滅札印度諸師復來函譖愬謂來者為外道及三使延師歸國稱讚師德於王王未之信貝馬滅札禮佛時對塑像曰我為真成佛者塑像遂坍王以像坍可惜疑師頗類外道貝馬隨就寢七日乃起復對像曰爾應隨我興像果還復如故神貌巍藹勝往所造三使曰貝馬滅札是自心成就之佛人能成就即佛真身王乃信方禮敬師王復遣使者噶瓦把遮赴印度請松幾桑瓦大師來藏以證歷來所學經軌之真偽請印度馬哈班者達而外并請震旦苾蒭及道士等六人乃至黑教有學問者俱請其傳法時王有疾黑教殺牛羊及鹿誦經印度留學諸師曰知罪故殺違背菩提天無二日民無二王一地兩教勢所難行王惡佛教與黑教勢同水火竟逐蘭格銀波及貝落渣那於是印度所來班者達等緘默不語求傳法亦不應時宰相中黑教徒打納若貢佛教徒得威若扎皆棄世二者各延師超度王見黑教之作法功德鮮少乃於黑教生疑王請大師與黑教辯論黑教不能勝次跛得薩埵次貝馬滅札與之相續辯論亦然佛說九地菩薩之功用與名稱且莫能答王乃罰其徒眾為奴并令剃髮給以惡衣惡食繫其經於犬尾焚之稍留其有益世間之法云黑教既撲滅竟貝馬滅札乃言於王應召貝落渣那歸國方能啟人民深厚之信仰王從之至是蓮花生大師跛得薩埵貝馬滅札貝落渣那王皆隆禮優渥恭敬供養所有無上密教中歡喜忿怒求財得權降魔醫病長壽諸多供養修持儀軌外內密諸多作法及顯教諸多經論乃至在漢族所得陰陽五行醫卜星相諸學皆按部次彙製成帙裝璜美麗先講解次傳授次修習如說而行復以傘蓋音樂香花燈彩捧舁經卷游行於市令民眾週知用資敬信深種善根民眾肩摩轂擊踴躍歡喜當諸班者達誦經開光時蘭格銀波遇王於途王曰朕為國主爾應禮拜蘭格銀波答曰王有疾時臣僧依法祈禱不辭疲勞及遠涉印度苦習秘法為王宏利護助王不見許而反棄之何故王不應蘭格心惡之謂王不明賞罰遂奔西藏南方羅那喀爾覺地而自修持爾時印度諸班者達勸王曰王翻經宏法功德浩大若生驕慢便不足觀宜召蘭格銀波返加以禮敬方合王崇隆三寶儀化兆民本意王乃出郭門親迎蘭格設座與共並躬自禮拜見者皆驚訝稱歎卿相等猜忌甚先設伏兵刀劍齊發而刺蘭格蘭格以內义印向外揮之卿相及士兵所持凶器盡行墜落王兀坐失色蘭格旋頓其足口作吽吽聲遣吉祥天母馬哈噶納大護法雷震俄香石山眾大震怖悚懼莫名王亦迷悶良久乃蘇起而禮拜人民莫不恭敬圍繞服其威德方知王信佛之毅力卓見非偶然也每白月八日十日黑月十一十五日常誦經佛誕亦然成為通例修橋築路學佛者助其資出家者得權人皆敬慕舟車不取其直貧者學佛富者周給之或為工作書寫而供以衣食顯經供列大殿密軌則別供一室漢族學業亦同發達翻經時期經歷十有三載謂之赤松得真本紀可謂之大師西藏應化史略亦可此藏中佛法發展之大略也嗣後諸尊佛像皆專修宮殿供之凡顯密兩教經軌之來歷及密乘菩薩之本事皆縷晰記載為後世作證明復以宴樂歌舞戲曲音樂等供養諸班者達復次容波加密磅乃大平原也特營莊嚴宮室凡西藏所有金銀寶珠及留學法師所譯經典盡供藏此處大師蒞臨讚美王及各班者達留學法師諸多功德竟於是貝馬滅札往五台山各班者達返印度漢族來者各還其故土留學法師分往各處宏法或入深山用功惟大師暨跛得薩埵留藏常伴王宏利不絕王之公主殤大師為慰王故說其宿命及將來受生因緣并以後某年戰爭某年平亂某年利生宏法因緣甚長以文繁從略王請命大師現在無論他年法衰時宜如何施其善巧以為救濟懇大師預記以神力藏之地水火風空諸處昭示後世并序其救世者之父母姓氏及其出家應化因緣時會到來次第發現指導來者引為南鍼大師允其請詳記之文繁從略十五大師垂訓示後之概略大師曰我之經軌猶如毒蛇之首用之善巧則得其珠否則反為所中傷聰聽本師言教自觀本心用功不擇貧富貴賤必選其實心信仰者而傳一切人前皆宜謙和勿稍驕矜勿貽憾於人我於爾所時經典法教業已傳竟印度西南方阿雅普林地有大惡族其人身量敵此土九人身之巨我當往度之我無去來惟信我者我即現在其前而為說法王為大師祖餞供養諸多奇珍將來度化之預記佈置已成王心慰甚但聞大師將往阿雅普林中懷難捨復懇留大師在藏教化大師許之大師諸弟子如何成佛之本事經典已載茲不贅述大師應化地域甚夥其在西藏身成佛之地曰咱結容中口成佛之地曰山陰青普心成佛之地曰羅那喀爾却功德成佛之地曰牙隆寫布惹阿技能成佛之地曰忙喀孫格重又牙隆寫布惹阿及山陰青普二地與印度之斯予察爾釋迦苦行地相同鳥巢其上亦安住不動必以難行苦行示現始足教導來者圭臬後世此大師在藏中修持示迹之大略也王問大師南閻浮提佛化之變遷如何大師曰釋迦教住世原有五千五百年之因緣因度女人減少五百年可有五千年之佛化每百年減壽一嵗教亦下降逐漸減至人壽十嵗時其教遂衰彼時人民稀少并無禮教故法亦澌滅殆盡人壽五十嵗時無上密乘逐漸發達嗣後年月日時分續續寖變精華漸減糟粕僅存爾時內外大戰風俗澆薄毀壞往古佛像經典塔婆制多天運無常晴雨不時五穀不登疾病難治餓殍徧地人不自主雖兄弟親戚亦相訟諍城池堡壘諸多撤毀天魔惡神威勢煥發生時為鬼為蜮不軌正道死後憧憧多墮鬼趣有多佛徒身雖出家心不入道女人多不貞良操守不固母女相猜小兒不受約束戰爭不已癘疫時作氣候大變寒暑失常當爾所時密教乃漸發達嵗次在丑正月朔藏俗慶度新年大師告王本年不賀新乃吉王本聽從卒為宰相權臣所阻背不遵命大師謂慶嵗猶可循例走馬决宜禁止眾仍不聽王遂馳馬撞樹枝中傷右脅病至三月薨於松喀兒地時王春秋五十有九大師攝政十有四年王子木連整波既成人眾議當紹王位忽為王妃所弒乃立其仲子木得整波為王即位後憂傷失怙並慮大師不獲久留大師告之曰生死無常愁憂無補宜宏佛法我攝位以來國中政教逐漸昌明我仍欲往阿雅普林地度彼惡類嗣王涕淚悲泣誠懇攀挽大師曰神道不度世間佛法礙難進展我决定往王勿苦留嗣王供養大師金銀珠寶種種珍異并請賜教開示大師為說治國方略并云嗣後每月初十必親蒞藏地以為加持云大師至昌周地為嗣王所聘印度翻經者二十有一人大師大弟子二十有一人及一切男女等灌頂并傳無上密法夜半大師口呼咱吽聲空中現一佛母著藍色裙衣人皮衣頭戴五髑髏冠左手持有髮人頭右手持金剛杵柄三角尖刀巡空一周一切忿怒歡喜半喜半怒九金剛等皆於空中示現次面達納瓦自空中五色虹彩中下降合掌恭敬讚歎大師三十二相八十種好諸多功德復謂後世供奉大師者所有息增懷誅四法如治病求權求財降魔等皆能滿願一切地水火風空諸多災難危險皆得免除猶如摩尼所求如意云云大眾諦聽歡喜信受大師復為嗣王木得整波灌頂命其法名曰確卓蒲甲爾波復為說其宿世因緣知嗣王曾為大師之大弟子轉身七世其最後身成佛以其尸體化為甘露供養大眾食其肉者皆得成佛廣結眾緣故報感為王復次嗣王之皇太妃三人特築一室松石嵌成閉關於此禮請大師求一簡要之法以期即身取證者大師示以生死事大無常迅速當勤精進先誦四皈依次發菩提心次尋求喇嘛以為依止次習定初不久坐逐漸加增如屋漏雨滴但間其時不忘其功心不拘執身隨所安且藉禪定以為基礎任何念起知而勿隨心不貪慾善惡念起不加修整惟常覺照若見光影美惡好醜不加驚喜惟澄心諦觀此基不立則所修難成佛心自心本自如如我見解脫一心不亂即謂成佛蓋大師垂教簡明易入無論業障輕重宿緣淺深遇斯教者必定成佛隨緣攝受無有欣厭任何根機皆堪教誨誠為有空不住妙彰中道者矣復次寫不拉大師靜坐之地也有別噶兒納噶納卡龍王納呼納三大護法行者禮敬供養靈感卓著利益實多大師回至桑依地請嗣王至告之曰若有疑難恣爾咨詢我不爾欺爾勿我疑欺誑非法疑師有罪供養喇嘛朝夕隨從少壯懈怠老悔無及命懸彈指倏忽即滅勤勇修學是為第一成佛法門觀心為最心無所住其相惟如勿助勿忘非有非空如是常恆二心不生慈悲為懷度生為念一切行處不貳不遷隨順修學庶乎近焉大師宣示既畢擬往忙約兒拱湯地嗣王决於其處預備祖餞嵗次在申孟秋之月大師起程王率臣工士女車駕隨從送至松喀兒地眾請大師更傳一法大師述六趣眾生苦報綦詳謂生老病死解脫匪易欲求出離當恪遵喇嘛訓誡修習顯密經軌出要之道惟此一事為實否則輪迴苦海無有出期文繁從略復至拉薩地為釋迦及觀音像開光四眾弟子及醫師等咸來禮敬求為開示大師所云文繁不述義謂成佛之法非從外求敬信師言內尋自心日事工作不捨所觀夜入夢寐能持自心時機成熟便大解脫隨至巴塘理塘諸地多數人民欲隨大師同行大師曰爾等死時我自當至勿勞爾請勿庸爾送大師在拱湯行時傳授避免地水火風空諸險難之秘軌凡十有三法傳畢大師誦吽吽聲空中降下一馬四天王捧馬足天女圍繞鞍飾寶珠四士護衛前勒銜轡羣見大師騎馬昇天漸近日邊影像乃寂眾皆靜坐心默威儀大師弟子有神通者見大師往印度經過展布殺列地復至孫噶納坐於白花樹下有惡神王妃嬪千人環跪學法其惡神王陰識為大師調伏度生安養遂奪彼身舍為王教化成佛者計二十有五人本書乃大師佛母曰葉興磋加者所紀錄藏在石罅後有大師之弟子曰烏簡靈巴取出繕寫流通以垂後世云葉興磋加乃般若佛母之化身生於西藏展母達之富家葉興智慧義磋海義加漲義其初生時舍側海水凸出水岸以人地雙喻其名生後不食人乳其舍宅柱上感生乳頭分泌樹漿吸之成長今其宅舍乳頭猶了了可辨云發願回向四恩加被恭輯經相過當求懺功悉回向冀茲勝寶如佛親降三界所瞻悉登慈航法施功德無量無邊發心贊助廣種福田願諸大德功不唐捐經相住世果滿功圓發菩提心利他為首六度萬行恩施九有願諸同道為不請友光光互攝作獅子吼師恩浩蕩窮劫難忘祈請師尊乘願再來悲智雙運普度有情師資涵攝智慧圓成以此功德上供下施川流不息行無緣慈徧滿虛空普周法界四聖六凡圓融無礙諾那上師在南京登隆巷十號駐京辦事處譯述此卷起於民國二十二年十一月十五日迄於二十三年二月二十七日南京密乘修學社補助用費計洋參佰柒拾元整諸君芳名列後依倪壽川居士報告為次第余崑陽謝鑄陳周仲良王右瑜倪壽川各四十元文素松三十元歐陽德三張叔同余彬帆各二十元袁一卿梅擷雲各十五元曹淨修十元王家齊九元周世屏八元鄭家瀛七元拓魯生六元朱子勉潘仲青各五元二十三年六月十三日杭州初版二十三年十月初十日重慶密乘弟子翻印本卷為諾那上師親口譯述筆受者有聞必錄不敢妄加刪潤義理未明寧缺勿濫自首至尾都為三萬一百餘字原本略去繁文者率有三之二在康藏為四眾朝夕恆誦之本在吾華族此特剏見無論漢唐以來未之前聞既有元一代崇重白教於此史畧亦無譯傳東密遠紹龍樹推尊大日阿達魯馬與奪絜槍之名字未經於耳蓮華生大師與釋迦佛之關係三藏諸部譯傳闕如弘法大師之判教秘密莊嚴亦止於第三級之瑜伽匪特三約噶未涉其藩即四母咱亦非其齊上師慈愍挈領提綱略示端倪渴望大心菩薩繼踵追踪溝通漢藏詳加探討得於文殊真實名經甚深秘偈廣加闡釋及四灌五緣十三地因道果等諸多教義有所發明徹法源底究竟菩提庶幾本大道達中和克致若乃泥執菩提道秘扃金剛持研相辨性蹉跎半世幼童株守經教皓首茫無際涯其或矜奇母咱起正之分沈酣朅磨喜樂之域壯落邪戲衰甘頹棄菩提湼槃尚在遙遠果能於母咱約噶師資秉承之深極高蹈中之妙般若秘密兼互鉤索則果海在𢫎何有望洋興歎之恨陀那蘊心絕無滯寂沉空之虞紅白兩教威震康藏譚玄說妙空言何補杲日經天妖氛斂迹洪鐘雷鳴瓦缶絕響矣海內仁者樂於本卷翻印流通啟眾敬信無任隨喜若於無上瑜伽奧義深旨或有未達幸勿擅加案語竄衍本文沈泥狹小劣見深障廣大幽微凡夫淺識臆測如來聖境自詡宏法利生者無有是處謹依事實聊為殿言贊辭得貌爰待後賢淨圓附誌
