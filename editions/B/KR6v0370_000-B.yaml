  text: 蓮華生大師應化史畧目次大師本迹大師成就阿彌陀佛為度人類示迹普度六趣示迹密法出生之濫觴馬張噶汝渣之來由調伏馬張噶汝渣之因緣賢劫千佛出世之緣起佛法歷劫住世之程序釋迦佛應化世界法教遞變之概况大師降生西印度之事迹大師為王太子前後之事迹大師度化印度各地之事迹大師西藏應化之事迹大師垂訓示後之概略
